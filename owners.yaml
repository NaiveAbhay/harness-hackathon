# owners.yaml — routing map for API-quality findings -> Jira.
#
# Tickets are NOT auto-created. build_dashboard.py groups findings per
# (team, module, check) and renders a "Create Jira ticket" button per group.
# The button is a PRE-FILLED Jira create link (summary/description/priority/
# labels already populated). Nothing is filed until a human clicks Create in
# Jira — no credentials, no backend.
#
# To finish setup: confirm the module->team groupings below, then fill in each
# team's `jira_project_key`. Everything else is optional. Numeric project id and
# Bug issue-type id (needed for the deep link) can be auto-resolved from the
# project key — leave the *_id fields blank and the build step will fill them.

defaults:
  jira_site: https://harness.atlassian.net
  issue_type: Bug
  # static-check severity -> Jira priority name
  severity_priority:
    HIGH: High
    MED:  Medium
    LOW:  Low
  # only groups whose top severity is at/above this floor get a button
  threshold: HIGH
  # don't bother surfacing a ticket button below this many findings in a group
  min_findings: 1
  base_labels: [api-quality, docs-drift]

# ---- Teams: confirm and fill jira_project_key --------------------------- #
teams:
  platform:
    display_name: Platform
    jira_project_key: "PL"      # "Platform" (id 10215)
    jira_project_id: "10215"
    component: ""               # optional
    default_assignee: ""        # optional (accountId or email)
    extra_labels: []
