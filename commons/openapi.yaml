openapi: 3.1.0
x-stoplight:
  id: oc91t4vrfnjyi
info:
  title: Common Models
  version: '1.0'
components:
  schemas:
    GovernanceStatus:
      type: string
      title: GovernanceStatus
      x-stoplight:
        id: kh0hxoiqon3so
      enum:
        - WARNING
        - ERROR
        - PASS
      description: Governance Status
    Policy:
      title: Policy
      x-stoplight:
        id: 96ka3iug8rbc4
      type: object
      properties:
        identifier:
          type: string
          description: Policy Identifier
        name:
          type: string
          description: Policy Name
        org:
          type: string
          description: Organization identifier where the Policy is defined
        project:
          type: string
          description: Project Identifier where the Policy is defined
        evaluation_error:
          type: string
          description: Error message in Policy Evaluation
        deny_messages:
          type: array
          description: Deny messages
          items:
            type: string
        status:
          $ref: '#/components/schemas/GovernanceStatus'
          description: Governance Status
      description: Contains Details about Policy
    PolicySet:
      title: PolicySet
      x-stoplight:
        id: lxrtpc1yji0pm
      type: object
      properties:
        identifier:
          type: string
          description: Identifer of the Policy Set
        name:
          type: string
          description: Name of the Policy Set
        org:
          type: string
          description: Organization Identifier where the Policy Set is defined
        project:
          type: string
          description: Project Identifier where the Policy Set is defined
        deny_messages:
          type: array
          description: Deny messages
          items:
            type: string
        status:
          $ref: '#/components/schemas/GovernanceStatus'
        policies:
          type: array
          description: List of policies defined inside Policy Set
          items:
            $ref: '#/components/schemas/Policy'
      description: Contains Policy Set Detail
    GovernanceMetadata:
      title: GovernanceMetadata
      x-stoplight:
        id: 05qhnkvljwzzm
      type: object
      description: Governace Error Details
      properties:
        deny:
          type: boolean
          description: Indicate whether the action is denied or not based on Governance rules
        message:
          type: string
          description: Governance Message
        status:
          $ref: '#/components/schemas/GovernanceStatus'
          description: Governace Status
        policy_sets:
          type: array
          items:
            $ref: '#/components/schemas/PolicySet'
    TestErrorMetadata:
      title: TestErrorMetadata
      x-stoplight:
        id: mgogkf26yt2ka
      type: object
      properties:
        type:
          type: string
        test:
          type: string
      required:
        - type
      description: Test Error Metadata
    ErrorMetadata:
      title: ErrorMetadata
      x-stoplight:
        id: 344dmnhe1c5kt
      oneOf:
        - $ref: '#/components/schemas/GovernanceMetadata'
          description: Governance Error Details
        - $ref: '#/components/schemas/TestErrorMetadata'
          description: Test Error Details
      discriminator:
        propertyName: type
        mapping:
          governance: /GovernanceMetadata.yaml
          test: ./TestErrorMetadata.yaml
      description: Contains more details about the error
      x-internal: false
    FieldError:
      title: FieldError
      x-stoplight:
        id: ahdrlp251yecr
      type: object
      properties:
        field_name:
          type: string
          description: Name of the field
        message:
          type: string
          description: Error message
      description: Contains Field-wise error detail
    ErrorResponse:
      title: ErrorResponse
      x-stoplight:
        id: vn5jzgz2umbw0
      type: object
      description: Contains information about the error
      properties:
        message:
          type: string
          description: Error Message
        code:
          type: string
          enum:
            - RESOURCE_NOT_FOUND
            - INVALID_ARGUMENT
          description: Error code
        errors:
          type: array
          description: Contains field-wise error detail
          items:
            $ref: '#/components/schemas/FieldError'
        error_metadata:
          $ref: '#/components/schemas/ErrorMetadata'
          description: Contains more details about the error
