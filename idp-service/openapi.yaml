  '/v1/entities':
    post:
      operationId: create-entity
      summary: Create an Entity
      description: >-
        Creates a new Entity in the specified scope (Account, Organization, or Project). 
        Entities are the core components of the catalog system and can represent various 
        resources such as services, APIs, user groups, and more. Each entity has a specific 
        kind and type that defines its purpose in the system.
      tags:
        - Entities
      security:
        - x-api-key: [ ]
      parameters:
        - $ref: '#/components/parameters/OrgIdentifierQueryParam'
        - $ref: '#/components/parameters/ProjectIdentifierQueryParam'
        - $ref: '#/components/parameters/AccountHeader'
        - name: convert
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: 'When set to true, converts Backstage style YAML to Harness entity YAML format'
        - name: dry_run
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: 'When set to true, validates the entity creation without actually creating it'
      requestBody:
        $ref: '#/components/requestBodies/EntityCreateRequestBody'
      responses:
        '201':
          $ref: '#/components/responses/EntityResponseBody'
          description: Entity successfully created
    get:
      operationId: get-entities
      summary: Get Entities
      description: >-
        Retrieves a paginated list of Entities based on the provided filters. 
        This endpoint supports comprehensive filtering options to help you find 
        specific entities across different scopes, kinds, and other properties.
        The response includes pagination metadata and counts for owned and favorite entities.
        
        When a search returns no matching entities, the API returns a 200 status code with an empty
        data array. This is the expected behavior for this list API. Note that 400 status codes are
        only returned when a specific entity is requested and not found (e.g., in the Get Entity Details endpoint).
      tags:
        - Entities
      security:
        - x-api-key: [ ]
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/LimitWithRestriction'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/SearchTerm'
        - name: scopes
          description: 'Filter entities by specific scopes (account.\*, account, account.org, account.org.project, account.orgId, account.orgId.projectId, account.orgId.\*)'
          in: query
          schema:
            type: string
            default: null
        - name: entity_refs
          description: 'Filter entities by their entity references (comma-separated list in the format of kind:scope/identifier)'
          in: query
          schema:
            type: string
            default: null
        - name: owned_by_me
          description: 'When true, returns only entities owned by the current user or their groups'
          in: query
          schema:
            type: boolean
            default: false
        - name: favorites
          description: When true, returns only entities marked as favorites by the current user
          in: query
          schema:
            type: boolean
            default: false
        - $ref: '#/components/parameters/KindQueryParam'
        - name: type
          description: 'Filter entities by their type (e.g., Service, Website)'
          in: query
          schema:
            type: string
            default: null
        - name: owner
          description: 'Filter entities by their owner references'
          in: query
          schema:
            type: string
            default: null
        - name: lifecycle
          description: 'Filter entities by their lifecycle stage (e.g., experimental, production)'
          in: query
          schema:
            type: string
            default: null
        - name: tags
          description: 'Filter entities by their associated tags (comma-separated list)'
          in: query
          schema:
            type: string
            default: null
      responses:
        '200':
          $ref: '#/components/responses/EntityResponseBodyList'
          description: Paginated list of entities matching the filter criteria with pagination metadata in headers (X-Total-Elements, X-Page-Number, X-Page-Size) and ownership counts (Total-Owned, Total-Starred)
