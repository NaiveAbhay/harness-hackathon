    post:
      summary: Generate presigned upload URL
      tags:
        - Uploads
      operationId: presignUpload
      description: Generate a presigned GCS URL for uploading an image or video file. Returns both the upload URL (for PUT) and the serve URL (for retrieval).
      parameters:
        - $ref: '#/components/parameters/AccountParam'
        - $ref: '#/components/parameters/OrgParam'
        - $ref: '#/components/parameters/ProjectParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresignUploadRequest'
      responses:
        '200':
          description: Presigned upload URL generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignUploadResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
      x-stoplight:
        id: uploads-presign-post
  /v1/uploads/{accountId}/{releaseId}/{filename}:
    get:
      summary: Serve uploaded file
      tags:
        - Uploads
      operationId: serveUpload
      description: Serve an uploaded file via a 307 redirect to a signed GCS URL. Performs post-upload size verification and deletes oversized objects.
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
          description: Account ID
        - name: releaseId
          in: path
          required: true
          schema:
            type: string
          description: Release ID
        - name: filename
          in: path
          required: true
          schema:
            type: string
          description: Filename of the uploaded file
      responses:
        '307':
          description: Redirect to signed GCS URL
          headers:
            Location:
              description: Signed GCS URL for the file
              schema:
                type: string
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
      x-stoplight:
        id: uploads-serve-get
