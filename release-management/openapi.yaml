openapi: 3.0.0
info:
  title: rms
  version: '1.0'
  description: This is the Open Api Spec 3 for the Release Management Service
tags:
  - name: Release Groups
    x-displayName: Release Groups [Beta]
  - name: Releases
    x-displayName: Releases [Beta]
  - name: Orchestration Processes
    x-displayName: Orchestration Processes [Beta]
  - name: Orchestration Activities
    x-displayName: Orchestration Activities [Beta]
  - name: Orchestration Executions
    x-displayName: Orchestration Executions [Beta]
  - name: Conflicts
    x-displayName: Conflicts [Beta]
  - name: Freeze
    x-displayName: Freeze [Beta]
  - name: Reports
    x-displayName: Reports [Beta]
  - name: Uploads
    x-displayName: Uploads [Beta]
paths:
  /releaseGroup:
    post:
      summary: Create New Release Group
      tags:
        - Release Groups
      operationId: post-releaseGroup
      responses:
        '200':
          $ref: '#/components/responses/CreateReleaseGroupResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      requestBody:
        $ref: '#/components/requestBodies/CreateReleaseGroupRequest'
      description: Create a new Release Group.
      x-stoplight:
        id: jb4zoa1afqk37
      parameters:
        - $ref: '#/components/parameters/AccountParam'
        - $ref: '#/components/parameters/OrgParam'
        - $ref: '#/components/parameters/ProjectParam'
      x-internal: false
    parameters: []
  /releaseGroup/{releaseGroupId}:
    delete:
      summary: Delete Release Group by ID
      tags:
        - Release Groups
      operationId: delete-releaseGroup
      parameters:
        - name: releaseGroupId
          in: path
          required: true
          schema:
            type: string
          description: The ID of the release group to delete.
        - $ref: '#/components/parameters/AccountParam'
        - $ref: '#/components/parameters/OrgParam'
        - $ref: '#/components/parameters/ProjectParam'
      responses:
        '200':
          $ref: '#/components/responses/DeleteReleaseGroupResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      description: Delete a specific Release Group by its ID.
    put:
      summary: Update Release Group
      responses:
        '200':
          $ref: '#/components/responses/UpdateReleaseGroupResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      parameters:
        - $ref: '#/components/parameters/AccountParam'
        - $ref: '#/components/parameters/OrgParam'
        - $ref: '#/components/parameters/ProjectParam'
        - name: releaseGroupId
          in: path
          required: true
          schema:
            type: string
          description: The ID of the release group to be updated.
      requestBody:
        $ref: '#/components/requestBodies/UpdateReleaseGroupRequest'
      tags:
        - Release Groups
      operationId: put-releaseGroup
      x-stoplight:
        id: 02njnetawglkw
    get:
      summary: Get Release Group by ID
      tags:
        - Release Groups
      operationId: get-releaseGroup
      description: Retrieve details of a specific Release Group.
      parameters:
        - name: releaseGroupId
          in: path
          required: true
          schema:
            type: string
          description: The ID of the release group.
        - $ref: '#/components/parameters/AccountParam'
        - $ref: '#/components/parameters/OrgParam'
        - $ref: '#/components/parameters/ProjectParam'
      responses:
        '200':
          $ref: '#/components/responses/GetReleaseGroupResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
    patch:
      summary: Partially Update Release Group
      tags:
        - Release Groups
      operationId: patch-releaseGroup
      description: Partially update a release group without recreating releases. Currently supports updating autoExecuteOnSchedule field.
      parameters:
        - name: releaseGroupId
          in: path
          required: true
          schema:
            type: string
          description: The ID of the release group to be updated.
        - $ref: '#/components/parameters/AccountParam'
        - $ref: '#/components/parameters/OrgParam'
        - $ref: '#/components/parameters/ProjectParam'
      requestBody:
        $ref: '#/components/requestBodies/PatchReleaseGroupRequest'
      responses:
        '200':
          $ref: '#/components/responses/PatchReleaseGroupResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      x-stoplight:
        id: abc123patchrg
  /releaseGroup/summary:
    get:
      summary: Fetch List of Release Group
      parameters:
        - $ref: '#/components/parameters/AccountParam'
        - $ref: '#/components/parameters/OrgParam'
        - $ref: '#/components/parameters/ProjectParam'
        - $ref: '#/components/parameters/SearchTermParam'
        - $ref: '#/components/parameters/StatusListParam'
        - $ref: '#/components/parameters/ReleaseTypeParam'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          $ref: '#/components/responses/ReleaseGroupSummaryResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      tags:
        - Release Groups
      operationId: get-releaseGroup-summary
      x-stoplight:
        id: vnpl6sumwnf7d
  /releaseGroup/{releaseGroupId}/components:
    parameters:
      - schema:
          type: string
        name: releaseGroupId
        in: path
        required: true
    get:
      summary: Get Component Details for a given releaseGroupId
      tags:
        - Release Groups
      responses:
        '200':
          $ref: '#/components/responses/ReleaseGroupComponentResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      operationId: get-releaseGroup-releaseGroupId-components
      x-stoplight:
        id: 2w5sf3g2ndb6r
      parameters:
        - $ref: '#/components/parameters/AccountParam'
  /releaseGroup/{releaseGroupId}/conflicts:
    get:
      summary: Fetch Release Conflicts
      tags:
        - Release Groups
      operationId: getReleaseConflicts
      description: Fetch a paginated list of release conflicts for a release group with optional status filtering
      parameters:
        - name: releaseGroupId
          in: path
          required: true
          schema:
            type: string
          description: ID of the release group
        - $ref: '#/components/parameters/ConflictStatusList'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/AccountParam'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          $ref: '#/components/responses/ReleaseConflictListResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /release/adhoc:
    post:
      summary: Create Ad Hoc Release
      tags:
        - Releases
      operationId: postReleaseAdhoc
      description: Create an ad hoc release with a linked orchestration process, bypassing the standard release group cadence.
      parameters:
        - $ref: '#/components/parameters/AccountParam'
        - $ref: '#/components/parameters/OrgParam'
        - $ref: '#/components/parameters/ProjectParam'
      requestBody:
        $ref: '#/components/requestBodies/CreateAdHocReleaseRequest'
      responses:
        '201':
          $ref: '#/components/responses/CreateAdHocReleaseResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      x-stoplight:
        id: release-adhoc-post
  /release/summary:
    post:
      summary: Fetch Release Summary
      tags:
        - Releases
      operationId: postReleaseSummary
      description: Fetch a list of releases based on the specified time ranges, optional filters, and search query.
      parameters:
        - $ref: '#/components/parameters/AccountParam'
        - $ref: '#/components/parameters/OrgParam'
        - $ref: '#/components/parameters/ProjectParam'
        - $ref: '#/components/parameters/SearchTermParam'
        - $ref: '#/components/parameters/ReleaseGroupIdsParam'
        - $ref: '#/components/parameters/ReleaseTypeParam'
      requestBody:
        $ref: '#/components/requestBodies/ReleaseSummaryRequest'
      responses:
        '200':
          $ref: '#/components/responses/ReleaseSummaryResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      x-stoplight:
        id: release-summary-post
  /release/{releaseId}:
    parameters:
      - schema:
          type: string
        name: releaseId
        in: path
        required: true
    get:
      summary: Fetch Release Information
      tags:
        - Releases
      responses:
        '200':
          $ref: '#/components/responses/ReleaseDetailsResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      operationId: get-release
      x-stoplight:
        id: 4d5bttf5i35ur
      description: Gets the release information for a given release
      parameters:
        - $ref: '#/components/parameters/AccountParam'
    put:
      summary: Update a single release
      tags:
        - Releases
      responses:
        '200':
          $ref: '#/components/responses/UpdateReleaseResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      operationId: put-release-releaseId
      x-stoplight:
        id: mn03c1582tzwt
      parameters:
        - $ref: '#/components/parameters/AccountParam'
      requestBody:
        $ref: '#/components/requestBodies/UpdateReleaseRequest'
  /release/{releaseId}/activities:
    get:
      summary: Fetch Release Activities
      tags:
        - Releases
      operationId: getReleaseActivities
      description: Fetch a list of activities based on the startTime, endTime and release Id.
      parameters:
        - $ref: '#/components/parameters/AccountParam'
        - $ref: '#/components/parameters/OrgParam'
        - $ref: '#/components/parameters/ProjectParam'
        - $ref: '#/components/parameters/ReleaseId'
        - $ref: '#/components/parameters/StartTime'
        - $ref: '#/components/parameters/EndTime'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/StatusListParam'
      responses:
        '200':
          $ref: '#/components/responses/ReleaseActivitiesResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      x-stoplight:
        id: release-activities-get
  /release/calendar/{releaseId}/activities:
    get:
      summary: Fetch Release Activities Day Wise
      tags:
        - Releases
      operationId: getReleaseDayActivities
      description: Fetch a list of activities based on the startTime, endTime and release Id for a day view
      parameters:
        - $ref: '#/components/parameters/AccountParam'
        - $ref: '#/components/parameters/OrgParam'
        - $ref: '#/components/parameters/ProjectParam'
        - $ref: '#/components/parameters/ReleaseId'
        - $ref: '#/components/parameters/StartTime'
        - $ref: '#/components/parameters/EndTime'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          $ref: '#/components/responses/ReleaseActivitiesResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      x-stoplight:
        id: release-day-activities-get
  /release/{releaseId}/approvals:
    get:
      summary: Fetch approvals activity for a release
      parameters:
        - $ref: '#/components/parameters/AccountParam'
        - $ref: '#/components/parameters/OrgParam'
        - $ref: '#/components/parameters/ProjectParam'
        - $ref: '#/components/parameters/ReleaseId'
        - $ref: '#/components/parameters/SearchTermParam'
        - $ref: '#/components/parameters/StatusListParam'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      tags:
        - Releases
      responses:
        '200':
          $ref: '#/components/responses/ReleaseApprovalsResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      operationId: get-release-releaseId-approvals
      x-stoplight:
        id: 4yjicdfvsjh0u
  /release/{releaseId}/environmentDashboard:
    parameters:
      - schema:
          type: string
        name: releaseId
        in: path
        required: true
      - $ref: '#/components/parameters/SearchTermParam'
      - $ref: '#/components/parameters/EnvironmentIdentifiersListParam'
      - $ref: '#/components/parameters/InfrastructureIdentifiersListParam'
    get:
      summary: Environment Dashbaord for a release
      tags:
        - Releases
      responses:
        '200':
          $ref: '#/components/responses/EnvironmentDashboardResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      operationId: get-release-releaseId-environmentDashboard
      x-stoplight:
        id: 06itdbm39d1dc
      description: Gets the environment dashboard for the given release
      parameters:
        - $ref: '#/components/parameters/AccountParam'
  /release/{releaseId}/environments:
    parameters:
      - schema:
          type: string
        name: releaseId
        in: path
        required: true
    get:
      summary: Fetch the list of environments for release
      tags:
        - Releases
      responses:
        '200':
          $ref: '#/components/responses/EnvironmentListPerReleaseResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      operationId: get-release-releaseId-environments
      x-stoplight:
        id: bhswqb69xhfox
      description: Api to fetch the list of environments for release
      parameters:
        - $ref: '#/components/parameters/AccountParam'
        - schema:
            type: string
          in: query
          name: cursor
          description: Next token for fetching the environment
        - $ref: '#/components/parameters/Limit'
        - schema:
            type: string
          in: query
          name: searchTerm
          description: Optional variable to filter environments based on the given prefix
  /release/{releaseId}/action:
    parameters:
      - schema:
          type: string
        name: releaseId
        in: path
        required: true
        description: Unique identifier for the release
    post:
      summary: Execute Action on Release
      operationId: postReleaseAction
      description: Executes an action on a release (e.g., abort)
      tags:
        - Releases
      parameters:
        - $ref: '#/components/parameters/AccountParam'
        - $ref: '#/components/parameters/OrgParam'
        - $ref: '#/components/parameters/ProjectParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseActionRequest'
      responses:
        '200':
          $ref: '#/components/responses/ReleaseActionResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      x-stoplight:
        id: release-action-put
  /release/{releaseId}/subprocess/trigger:
    parameters:
      - schema:
          type: string
        name: releaseId
        in: path
        required: true
        description: Unique identifier for the release
    post:
      summary: Trigger Subprocess from Task
      operationId: postReleaseSubprocessTrigger
      description: Triggers a subprocess release from a task within the specified release
      tags:
        - Releases
      parameters:
        - $ref: '#/components/parameters/AccountParam'
        - $ref: '#/components/parameters/OrgParam'
        - $ref: '#/components/parameters/ProjectParam'
        - name: task_id
          in: query
          required: true
          schema:
            type: string
          description: The user_reference_id of the task that triggers the subprocess
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubprocessTriggerRequest'
      responses:
        '200':
          $ref: '#/components/responses/SubprocessTriggerResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      x-stoplight:
        id: release-subprocess-trigger-post
  /release/{releaseId}/tasks:
    get:
      summary: Fetch Release Tasks
      tags:
        - Releases
      operationId: getReleaseTasks
      description: Fetch a paginated list of tasks from Manual Activities for a release with cursor-based pagination and optional status filtering.
      parameters:
        - $ref: '#/components/parameters/AccountParam'
        - $ref: '#/components/parameters/OrgParam'
        - $ref: '#/components/parameters/ProjectParam'
        - name: releaseId
          in: path
          required: true
          schema:
            type: string
          description: Release ID
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: status
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              description: Current status of the execution task
              enum:
                - TODO
                - IN_PROGRESS
                - SUCCEEDED
                - FAILED
                - BLOCKED
              x-oapi-codegen-extra-tags:
                validate: required
          description: Filter tasks by status (TODO, IN_PROGRESS, SUCCEEDED, FAILED, BLOCKED)
      responses:
        '200':
          $ref: '#/components/responses/ReleaseTasksResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      x-stoplight:
        id: release-tasks-get
  /release/{releaseId}/report/generate:
    post:
      summary: Generate Report for Release
      tags:
        - Reports
      operationId: postReleaseReportGenerate
      description: Generate a CSV report for a specific release within a time period. The report generation is asynchronous and returns a report job ID that can be used to track status and download the report.
      parameters:
        - $ref: '#/components/parameters/AccountParam'
        - $ref: '#/components/parameters/OrgParam'
        - $ref: '#/components/parameters/ProjectParam'
        - name: releaseId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportGenerationRequest'
      responses:
        '200':
          $ref: '#/components/responses/ReportGenerationResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
      x-stoplight:
        id: release-report-generate-post
  /releaseGroup/{releaseGroupId}/report/generate:
    post:
      summary: Generate Report for Release Group
      tags:
        - Reports
      operationId: postReleaseGroupReportGenerate
      description: Generate a CSV report for all releases in a release group within a time period. The report generation is asynchronous and returns a report job ID that can be used to track status and download the report.
      parameters:
        - $ref: '#/components/parameters/AccountParam'
        - $ref: '#/components/parameters/OrgParam'
        - $ref: '#/components/parameters/ProjectParam'
        - name: releaseGroupId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportGenerationRequest'
      responses:
        '200':
          $ref: '#/components/responses/ReportGenerationResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
      x-stoplight:
        id: release-group-report-generate-post
  /release/report/{reportId}/status:
    get:
      summary: Get Report Status
      tags:
        - Reports
      operationId: getReportStatus
      description: Get the status of a report generation job. Returns the current status, timestamps, and error information if the job failed.
      parameters:
        - $ref: '#/components/parameters/AccountParam'
        - $ref: '#/components/parameters/OrgParam'
        - $ref: '#/components/parameters/ProjectParam'
        - name: reportId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/ReportStatusResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
      x-stoplight:
        id: report-status-get
  /release/report/{reportId}/download:
    get:
      summary: Download Report
      tags:
        - Reports
      operationId: getReportDownload
      description: Download the generated CSV report. The report must be in COMPLETED status. Returns the CSV file as a binary download.
      parameters:
        - $ref: '#/components/parameters/AccountParam'
        - $ref: '#/components/parameters/OrgParam'
        - $ref: '#/components/parameters/ProjectParam'
        - name: reportId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: CSV file download
          headers:
            Content-Disposition:
              description: Indicates that the file should be downloaded as an attachment
              schema:
                type: string
                example: attachment; filename="release-report-{reportId}.csv"
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
      x-stoplight:
        id: report-download-get
  /conflicts/{executionId}:
    put:
      summary: Update Release Conflict
      tags:
        - Conflicts
      operationId: updateReleaseConflict
      description: Update release ID and type for a release conflict
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
          description: ID of the execution to update
        - $ref: '#/components/parameters/AccountParam'
      requestBody:
        required: true
        content:
          application/json:
