  /release/{releaseId}/execution/activities:
    get:
      summary: Get Paginated Activities by Release ID
      tags:
        - Orchestration Executions
      operationId: get-orchestration-execution-activities-paginated
      description: |
        Retrieve a paginated list of orchestration execution activities for a specific release with optional filters.

        **Sortable fields:** `start_ts`, `startTs`, `end_ts`, `endTs`, `last_updated_at`, `lastUpdatedAt`, `created_at`, `createdAt`, `name`, `identifier`, `status`, `type`.
        Sort format: `sort=field_name&sort=direction` where direction is `asc` or `desc`.
        Examples: `sort=start_ts&sort=desc` or `sort=endTs&sort=asc`.
      parameters:
        - name: releaseId
          in: path
          required: true
          schema:
            type: string
          description: The ID of the release
        - $ref: '#/components/parameters/AccountParam'
        - $ref: '#/components/parameters/OrgParam'
        - $ref: '#/components/parameters/ProjectParam'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/OrchestrationStatusListParam'
        - name: type
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - PIPELINE
                - SUBPROCESS
                - MANUAL
          description: Filter activities by type (PIPELINE, SUBPROCESS, MANUAL)
        - name: phaseIdentifier
          in: query
          required: false
          schema:
            type: string
          description: Filter activities by phase identifier
        - name: startTs
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: Filter activities that started on or after this timestamp (in milliseconds). Activities with start_ts >= startTs will be included.
        - name: endTs
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: Filter activities that started on or before this timestamp (in milliseconds). Activities with start_ts <= endTs will be included.
        - name: taskUserReferenceId
          in: query
          required: false
          schema:
            type: string
          description: Filter activities that were triggered by tasks with the specified user_reference_id. Only activities linked to tasks via the activity_task_id table will be returned.
      responses:
        '200':
          $ref: '#/components/responses/OrchestrationExecutionActivitiesPaginatedResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
