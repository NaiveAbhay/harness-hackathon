apis:
  harness@v1:
    root: merged.yaml
    decorators:
      remove-x-internal: on
  harness@internal:
    root: merged.yaml
  harness@harness-code:
    root: merged.yaml
    decorators:
      remove-x-internal: on
features.openapi:
  htmlTemplate: ./index.html
theme.openapi:
  sortOperationsAlphabetically: true
  lint:
    extends:
      -  minimal
rules:
  no-identical-paths: warn
  spec: warn
