                type: string
              rules:
                description: >-
                  An array of rules that can cause a user to be included in this
                  segment.
                items:
                  $ref: '#/components/schemas/Clause'
                type: array
              tags:
                items:
                  $ref: '#/components/schemas/Tag'
                type: array
            required:
              - name
              - environment
              - project
            type: object
      required: true
    TagRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Tag'
      required: true
    TargetPatchRequest:
      content:
        application/json:
          example:
            gitDetails:
              commitMsg: Making some changes
            instructions:
              - kind: addToIncludeList
                parameters:
                  segments:
                    - alpha-testers
                    - beta-testers
              - kind: removeFromIncludeList
                parameters:
                  segments:
                    - alpha-testers
                    - beta-testers
              - kind: addToExcludeList
                parameters:
                  segments:
                    - alpha-testers
                    - beta-testers
              - kind: removeFromExcludeList
                parameters:
                  segments:
                    - alpha-testers
                    - beta-testers
              - kind: addTargetToFlagsVariationTargetMap
                parameters:
                  features:
                    - identifier: flag1
                      variation: 'true'
                    - identifier: flag2
                      variation: 'false'
              - kind: removeTargetFromFlagsVariationTargetMap
                parameters:
                  features:
                    - identifier: flag1
                      variation: 'true'
                    - identifier: flag2
                      variation: 'false'
          schema:
            $ref: '#/components/schemas/GitSyncPatchOperation'
    TargetRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Target'
      required: true
    v1Agent:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/v1Agent'
      required: true
    servicev1ReconcilerFilter:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/servicev1ReconcilerFilter'
      required: true
