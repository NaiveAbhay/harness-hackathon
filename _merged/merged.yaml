      operationId: createZendeskTicket
      parameters:
        - name: emailId
          in: query
          description: emailId for user creating ticket
          required: true
          schema:
            type: string
        - name: ticketType
          in: query
          description: 'type of the ticket '
          required: true
          schema:
            type: string
            enum:
              - QUESTION
              - PROBLEM
              - FEATURE_REQUEST
              - OTHER
        - name: priority
          in: query
          description: priority of the ticket
          required: true
          schema:
            type: string
            enum:
              - LOW
              - NORMAL
              - HIGH
              - URGENT
        - name: subject
          in: query
          description: subject of the ticket
          required: true
          schema:
            type: string
      requestBody:
        content:
          '*/*':
            schema:
              type: object
              properties:
                message:
                  type: string
                url:
                  type: string
                userBrowser:
                  type: string
                userOS:
                  type: string
                website:
                  type: string
                userName:
                  type: string
                accountId:
                  type: string
                module:
                  type: string
                browserResolution:
                  type: string
                file:
                  $ref: '#/components/schemas/FormDataContentDisposition'
