      description: GetAppDetails returns application details by given path.
      operationId: AgentRepositoryService_GetAppDetails
      responses:
        '200':
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/repositoriesRepoAppDetailsResponse'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gatewayruntimeError'
      parameters:
        - name: agentIdentifier
          description: Agent identifier for entity.
          in: path
          required: true
          schema:
            type: string
        - name: identifier
          in: path
          required: true
          schema:
            type: string
        - name: accountIdentifier
          description: Account Identifier for the Entity.
          in: query
          required: true
          schema:
            type: string
        - name: orgIdentifier
          description: Organization Identifier for the Entity.
          in: query
          required: false
          schema:
            type: string
        - name: projectIdentifier
          description: Project Identifier for the Entity.
          in: query
          required: false
          schema:
            type: string
        - name: query.source.repoURL
          description: >-
            RepoURL is the URL to the repository (Git or Helm) that contains the
            application manifests.
          in: query
          required: false
          schema:
            type: string
        - name: query.source.path
          description: >-
            Path is a directory path within the Git repository, and is only
            valid for applications sourced from Git.
          in: query
          required: false
          schema:
            type: string
        - name: query.source.targetRevision
          description: >-
            TargetRevision defines the revision of the source to sync the
            application to.

            In case of Git, this can be commit, tag, or branch. If omitted, will
            equal to HEAD.

            In case of Helm, this is a semver tag for the Chart's version.
          in: query
          required: false
          schema:
            type: string
        - name: query.source.helm.valueFiles
          description: >-
            ValuesFiles is a list of Helm value files to use when generating a
            template.
          in: query
          required: false
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: query.source.helm.releaseName
          description: >-
            ReleaseName is the Helm release name to use. If omitted it will use
            the application name.
          in: query
          required: false
          schema:
            type: string
        - name: query.source.helm.values
          description: >-
            Values specifies Helm values to be passed to helm template,
            typically defined as a block.
          in: query
          required: false
          schema:
            type: string
        - name: query.source.helm.version
          description: >-
            Version is the Helm version to use for templating (either "2" or
            "3").
          in: query
          required: false
          schema:
            type: string
        - name: query.source.helm.passCredentials
          description: >-
            PassCredentials pass credentials to all domains (Helm's
            --pass-credentials).
          in: query
          required: false
          schema:
            type: boolean
        - name: query.source.kustomize.namePrefix
          description: NamePrefix is a prefix appended to resources for Kustomize apps.
          in: query
          required: false
          schema:
            type: string
        - name: query.source.kustomize.nameSuffix
          description: NameSuffix is a suffix appended to resources for Kustomize apps.
          in: query
          required: false
          schema:
            type: string
        - name: query.source.kustomize.images
          description: Images is a list of Kustomize image override specifications.
          in: query
          required: false
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: query.source.kustomize.version
          description: >-
            Version controls which version of Kustomize to use for rendering
            manifests.
          in: query
          required: false
          schema:
            type: string
        - name: query.source.kustomize.forceCommonLabels
          description: >-
            ForceCommonLabels specifies whether to force applying common labels
            to resources for Kustomize apps.
          in: query
          required: false
          schema:
            type: boolean
        - name: query.source.kustomize.forceCommonAnnotations
          description: >-
            ForceCommonAnnotations specifies whether to force applying common
            annotations to resources for Kustomize apps.
          in: query
          required: false
          schema:
            type: boolean
        - name: query.source.ksonnet.environment
          description: Environment is a ksonnet application environment name.
          in: query
          required: false
          schema:
            type: string
        - name: query.source.directory.recurse
          description: >-
            Recurse specifies whether to scan a directory recursively for
            manifests.
          in: query
          required: false
          schema:
            type: boolean
        - name: query.source.directory.jsonnet.libs
          description: Additional library search dirs.
          in: query
          required: false
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: query.source.directory.exclude
          description: >-
            Exclude contains a glob pattern to match paths against that should
            be explicitly excluded from being used during manifest generation.
          in: query
          required: false
          schema:
            type: string
        - name: query.source.directory.include
          description: >-
            Include contains a glob pattern to match paths against that should
            be explicitly included during manifest generation.
          in: query
          required: false
          schema:
            type: string
        - name: query.source.plugin.name
          in: query
          required: false
          schema:
            type: string
        - name: query.source.chart
          description: >-
            Chart is a Helm chart name, and must be specified for applications
            sourced from a Helm repo.
          in: query
          required: false
          schema:
            type: string
        - name: query.appName
          in: query
          required: false
          schema:
            type: string
        - name: query.appProject
          in: query
          required: false
          schema:
            type: string
      tags:
        - Repositories
