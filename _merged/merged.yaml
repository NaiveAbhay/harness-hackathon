            default: false
      requestBody:
        description: Pipeline YAML to be updated
        content:
          application/yaml:
            schema:
              type: string
            examples:
              Update:
                summary: Sample Update Pipeline YAML
                description: Sample Pipeline YAML with One Build Stage and One Deploy Stage
                value: |
                  pipeline:
                      name: Sample Pipeline
                      identifier: Sample_Pipeline
                      allowStageExecutions: false
                      projectIdentifier: Temp
                      orgIdentifier: default
                      tags: {}
                      stages:
                          - stage:
                                name: Sample Stage
                                identifier: Sample_Stage
                                description: ""
                                type: Approval
                                spec:
                                    execution:
                                        steps:
                                            - step:
                                                  name: Approval Step
                                                  identifier: Approval_Step
                                                  type: HarnessApproval
                                                  timeout: 1d
                                                  spec:
                                                      approvalMessage: |-
                                                          Please review the following information
                                                          and approve the pipeline progression
                                                      includePipelineExecutionHistory: true
                                                      approvers:
                                                          minimumCount: 1
                                                          disallowPipelineExecutor: false
                                                          userGroups: <+input>
                                                      approverInputs: []
                                            - step:
                                                  type: ShellScript
                                                  name: ShellScript Step
                                                  identifier: ShellScript_Step
                                                  spec:
                                                      shell: Bash
                                                      onDelegate: true
                                                      source:
                                                          type: Inline
                                                          spec:
                                                              script: <+input>
                                                      environmentVariables: []
                                                      outputVariables: []
                                                      executionTarget: {}
                                                  timeout: 10m
                                tags: {}
                          - stage:
                                name: Sample Deploy Stage
                                identifier: Sample_Deploy_Stage
                                description: ""
                                type: Deployment
                                spec:
                                    serviceConfig:
                                        serviceRef: <+input>
                                        serviceDefinition:
                                            spec:
                                                variables: []
                                            type: Kubernetes
                                    infrastructure:
                                        environmentRef: <+input>
                                        infrastructureDefinition:
                                            type: KubernetesDirect
                                            spec:
                                                connectorRef: <+input>
                                                namespace: <+input>
                                                releaseName: release-<+INFRA_KEY>
                                        allowSimultaneousDeployments: false
                                    execution:
                                        steps:
                                            - step:
                                                  name: Rollout Deployment
                                                  identifier: rolloutDeployment
                                                  type: K8sRollingDeploy
                                                  timeout: 10m
                                                  spec:
                                                      skipDryRun: false
                                        rollbackSteps:
                                            - step:
                                                  name: Rollback Rollout Deployment
                                                  identifier: rollbackRolloutDeployment
                                                  type: K8sRollingRollback
                                                  timeout: 10m
                                                  spec: {}
                                tags: {}
                                failureStrategies:
                                    - onFailure:
                                          errors:
                                              - AllErrors
                                          action:
                                              type: StageRollback
        required: true
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineFailure'
            application/yaml:
              schema:
                $ref: '#/components/schemas/PipelineFailure'
