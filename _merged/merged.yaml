          Template for this can be Fetched from /inputSets/template API.
        content:
          application/yaml:
            schema:
              type: string
            examples:
              Execute Runtime Input YAML:
                summary: Execute Pipeline with Runtime Input YAML
                description: Execute Runtime Input YAML
                value: |
                  pipeline:
                    identifier: "Sample_Pipeline"
                    stages:
                        - stage:
                            identifier: "Sample_Stage"
                            type: "Approval"
                            spec:
                                execution:
                                    steps:
                                        - step:
                                            identifier: "Approval_Step"
                                            type: "HarnessApproval"
                                            spec:
                                              approvers:
                                                userGroups: 
                                                  - account._account_all_users:
                                        - step:
                                            identifier: "Shellscript_Step"
                                            type: "ShellScript"
                                            spec:
                                              source:
                                                type: "Inline"
                                                spec:
                                                  script: "exit 0"
                        - stage:
                            identifier: "Sample_Deploy_Stage"
                            type: "Deployment"
                            spec:
                              serviceConfig:
                                serviceRef: "service1"
                              infrastructure:
                                  environmentRef: "env1"
                                  infrastructureDefinition:
                                                type: "KubernetesDirect"
                                                spec:
                                                  connectorRef: "KubernetesConnector>"
                                                  namespace: "default"
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineFailure'
            application/yaml:
              schema:
                $ref: '#/components/schemas/PipelineFailure'
        '500':
