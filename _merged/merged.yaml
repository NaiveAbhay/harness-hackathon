    CfApiKey:
      description: The API key is used by SDKs to connect to Harness Feature Flags
      properties:
        apiKey:
          description: >-
            The Key will be shown only on create. On subsequent GET calls, only
            the masked APIKeys will be returned
          example: b03af1cd-bd3f-472b-a4b0-c9c9c09c642e
          type: string
        identifier:
          description: The environment that this key was created in
          example: production
          type: string
        key:
          description: A hash of API key
          example: 3c940273c34e8a9b21
          type: string
        name:
          description: The user friendly identifier for the API Key
          example: Production Server Key
          type: string
        type:
          description: The type of key depending on the SDK that is being used.
          enum:
            - server
            - client
          example: server
          type: string
      required:
        - name
        - apiKey
        - identifier
        - type
      type: object
    ApiKeyRequestType:
      description: The type of key depending on the SDK that is being used.
      enum:
        - Server
        - Client
      example: Server
      type: string
    ApiKeys:
      allOf:
        - $ref: '#/components/schemas/Pagination'
        - properties:
            apiKeys:
              items:
                $ref: '#/components/schemas/CfApiKey'
              type: array
      description: A list of API Keys
      type: object
    Clause:
      description: A clause describes what conditions are used to evaluate a flag
      properties:
        attribute:
          description: >-
            The attribute to use in the clause.  This can be any target
            attribute
          example: identifier
          type: string
        id:
          description: The unique ID for the clause
          example: 32434243
          type: string
        negate:
          description: Is the operation negated?
          example: false
          type: boolean
        op:
          description: 'The type of operation such as equals, starts_with, contains'
          example: starts_with
          type: string
        values:
          description: The values that are compared against the operator
          items:
            type: string
          type: array
      required:
        - attribute
        - op
        - negate
        - values
      type: object
    Distribution:
      description: Describes a distribution rule
      properties:
        bucketBy:
          description: The attribute to use when distributing targets across buckets
          type: string
        variations:
          description: A list of variations and the weight that should be given to each
          items:
            $ref: '#/components/schemas/WeightedVariation'
          type: array
      required:
        - bucketBy
        - variations
      type: object
    CfError:
      properties:
        code:
          description: The http error code
          example: 404
          type: string
        details:
          description: Additional details about the error
          type: object
        message:
          description: The reason the request failed
          example: 'Error retrieving projects, organization ''default_org'' does not exist'
          type: string
      required:
        - code
        - message
      type: object
    Feature:
      description: A Feature Flag response
      properties:
        archived:
          description: Indicates if the flag has been archived and is no longer used
          example: false
          type: boolean
        createdAt:
          description: The date the flag was created in milliseconds
          format: int64
          type: integer
        defaultOffVariation:
          description: The default value returned when a flag is off
          example: true
          type: string
        defaultOnVariation:
          description: The default value returned when a flag is on
          example: true
          type: string
        description:
          description: A description for this flag
          example: A flag to control a new feature in production
          type: string
        envProperties:
          description: The Feature Flag rules for a given environment
          properties:
            defaultServe:
              $ref: '#/components/schemas/Serve'
            environment:
              description: The environment identifier
              type: string
            jiraEnabled:
              description: >-
                Indicates whether jira functionality is enabled for the given
                account, project, org, and environment
              type: boolean
            jiraIssues:
              description: >-
                An array of Jira Issues linked to this Feature. Returns empty if
                none exist
              items:
                $ref: '#/components/schemas/JiraIssue'
              type: array
            modifiedAt:
              description: The last time the flag was modified in this environment
              format: int64
              type: integer
            offVariation:
              description: >-
                The variation to serve for this flag in this environment when
                the flag is off
              type: string
            pipelineConfigured:
              type: boolean
            pipelineDetails:
              $ref: '#/components/schemas/FeaturePipeline'
            pipelineErrorReason:
              type: string
            pipelineErrorState:
              type: boolean
            rules:
              description: >-
                A list of rules to use when evaluating this flag in this
                environment
              items:
                $ref: '#/components/schemas/ServingRule'
              type: array
            state:
              $ref: '#/components/schemas/FeatureState'
            variationMap:
              description: >-
                A list of the variations that will be served to specific targets
                or target groups in an environment.
              items:
                $ref: '#/components/schemas/VariationMap'
              type: array
            version:
              description: >-
                The version of the flag.  This is incremented each time it is
                changed
              format: int64
              type: integer
          required:
            - state
            - defaultServe
            - environment
            - offVariation
            - pipelineConfigured
          type: object
        evaluation:
          description: The value that the flag will return for the current user
          example: true
          type: string
        evaluationIdentifier:
          description: The identifier for the returned evaluation
          example: on-variation
          type: string
        identifier:
          description: The Feature Flag identifier
          example: bool-flag
          type: string
        kind:
          description: The type of Feature flag
          enum:
            - boolean
            - int
            - string
            - json
          example: boolean
          type: string
        modifiedAt:
          description: The date the flag was last modified in milliseconds
          format: int64
          type: integer
        name:
          description: The name of the Feature Flag
          example: My Boolean Flag
          type: string
        owner:
          description: The user who created the flag
          example: johndoe
          items:
            type: string
          type: array
        permanent:
          description: 'Indicates if this is a permanent flag, or one that should expire'
          example: true
          type: boolean
        prerequisites:
          items:
            $ref: '#/components/schemas/Prerequisite'
          type: array
        project:
          description: The project this Feature belongs to
          example: test-project
          type: string
        results:
          description: >-
            The results shows which variations have been evaluated, and how many
            times each of these have been evaluated.
          items:
            $ref: '#/components/schemas/Results'
          type: array
        services:
          description: A list of services linked to this Feature Flag
          items:
            $ref: '#/components/schemas/CfService'
          type: array
        stale:
          description: Whether the flag is stale or not
          example: false
          type: boolean
        staleReason:
          description: The reason that the flag was marked as stale
          example: matched-criteria
          type: string
        status:
          $ref: '#/components/schemas/FeatureStatus'
        tags:
          description: A list of tags for this Feature Flag
          items:
            $ref: '#/components/schemas/Tag'
          type: array
        variations:
          description: The variations that can be returned for this flag
          items:
            $ref: '#/components/schemas/Variation'
          minItems: 2
          type: array
      required:
        - project
        - identifier
        - createdAt
        - kind
        - name
        - variations
        - defaultOnVariation
        - defaultOffVariation
      type: object
    FeatureCounts:
      properties:
        totalActive:
          description: >-
            The total number of flags with a active status in a
            project/environment
          example: 5
          type: integer
        totalArchived:
          description: The total number of archived flags in the project/environment
          example: 10
