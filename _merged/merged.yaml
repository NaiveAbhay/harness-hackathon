paths:
  /v1/roles:
    parameters: []
    get:
      summary: List Roles
      operationId: list-roles-acc
      description: Returns a list of Roles present in the Account scope.
      security:
        - x-api-key: []
      parameters:
        - $ref: '#/components/parameters/PageIndex'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/SearchTerm'
        - $ref: '#/components/parameters/AccountHeader'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
      responses:
        '200':
          $ref: '#/components/responses/RolesListResponse'
      tags:
        - Account Roles
    post:
      summary: Create a Role
      operationId: create-role-acc
      description: Creates a custom Role in the Account scope.
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      requestBody:
        $ref: '#/components/requestBodies/CreateRoleRequest'
      responses:
        '201':
          $ref: '#/components/responses/RoleResponse'
      security:
        - x-api-key: []
      tags:
        - Account Roles
  /v1/public-access/enable:
    parameters: []
    post:
      summary: Enable Public Access for a Resource
      operationId: enable-public-access
      description: Enable Public Access for a Resource
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      requestBody:
        $ref: '#/components/requestBodies/PublicAccessRequest'
      responses:
        '201':
          $ref: '#/components/responses/PublicAccessResponse'
      security:
        - x-api-key: []
      tags:
        - Public Access
      x-internal: true
  /v1/public-access/is-resource-public:
    parameters: []
    post:
      summary: Returns if a Resource is public or not
      operationId: is-resource-public
      description: 'Returns if a Resource is public or not '
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      requestBody:
        $ref: '#/components/requestBodies/PublicAccessRequest'
      responses:
        '200':
          $ref: '#/components/responses/PublicAccessResponse'
        '':
          $ref: '#/components/responses/PublicAccessResponse'
      security:
        - x-api-key: []
      tags:
        - Public Access
      x-internal: true
  /v1/public-access/disable:
    parameters: []
    put:
      summary: Disable public access on a Resource
      operationId: disable-public-access
      responses:
        '200':
          $ref: '#/components/responses/PublicAccessResponse'
      description: Disable Public Access
      security:
        - x-api-key: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
        - schema:
            type: string
          in: query
          name: account
          description: Account Identifier
        - schema:
            type: string
          in: query
          name: org
          description: Organisation Identifier
        - schema:
            type: string
          in: query
          name: project
          description: Project Identifier
        - schema:
            type: string
          in: query
          name: resource_type
          description: Resource type
        - schema:
