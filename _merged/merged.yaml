                summary: Sample Update Template YAML
                description: Sample Template YAML
                value: |
                  template:
                    name: pipelineTemplate
                    identifier: pipelineTemplate
                    versionLabel: v1
                    type: Pipeline
                    projectIdentifier: TemplateDemo
                    orgIdentifier: default
                    tags: {}
                    spec:
                      stages:
                        - stage:
                            name: stage1
                            identifier: stage1
                            description: ""
                            type: Deployment
                            spec:
                              deploymentType: Kubernetes
                              service:
                                serviceRef: <+input>
                                serviceInputs: <+input>
                              environment:
                                environmentRef: <+input>
                                deployToAll: false
                                environmentInputs: <+input>
                                infrastructureDefinitions: <+input>
                              execution:
                                steps:
                                  - step:
                                      type: ShellScript
                                      name: Shell Script_1
                                      identifier: ShellScript_1
                                      spec:
                                        shell: Bash
                                        onDelegate: true
                                        source:
                                          type: Inline
                                          spec:
                                            script: <+input>
                                        environmentVariables: []
                                        outputVariables: []
                                      timeout: 10m
                                rollbackSteps: []
                            tags: {}
                            failureStrategies:
                              - onFailure:
                                  errors:
                                    - AllErrors
                                  action:
                                    type: StageRollback
          application/yaml:
            schema:
              type: string
            examples:
              Update:
                summary: Sample Update Template YAML
                description: Sample Template YAML
                value: |
                  template:
                    name: pipelineTemplate
                    identifier: pipelineTemplate
                    versionLabel: v1
                    type: Pipeline
                    projectIdentifier: TemplateDemo
                    orgIdentifier: default
                    tags: {}
                    spec:
                      stages:
                        - stage:
                            name: stage1
                            identifier: stage1
                            description: ""
                            type: Deployment
                            spec:
                              deploymentType: Kubernetes
                              service:
                                serviceRef: <+input>
                                serviceInputs: <+input>
                              environment:
                                environmentRef: <+input>
                                deployToAll: false
                                environmentInputs: <+input>
                                infrastructureDefinitions: <+input>
                              execution:
                                steps:
                                  - step:
                                      type: ShellScript
                                      name: Shell Script_1
                                      identifier: ShellScript_1
                                      spec:
                                        shell: Bash
                                        onDelegate: true
                                        source:
                                          type: Inline
                                          spec:
                                            script: <+input>
                                        environmentVariables: []
                                        outputVariables: []
                                      timeout: 10m
                                rollbackSteps: []
                            tags: {}
                            failureStrategies:
                              - onFailure:
                                  errors:
                                    - AllErrors
                                  action:
                                    type: StageRollback
        required: true
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateFailure'
            application/yaml:
              schema:
                $ref: '#/components/schemas/TemplateFailure'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateError'
            application/yaml:
              schema:
                $ref: '#/components/schemas/TemplateError'
        default:
          description: Returns the updated Template Version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseDTOTemplateWrapperResponse'
            application/yaml:
              schema:
                $ref: '#/components/schemas/ResponseDTOTemplateWrapperResponse'
