          type: array
          items:
            $ref: '#/components/schemas/UserJourney'
        burn_rate:
          type: number
          description: >-
            Burn rate per day of the SLO. The unit is "Minutes" if the
            Evaluation type is Window, for Request based it's "Request".
          format: double
        error_budget_remaining_percentage:
          type: number
          description: Error Budget Remaining Percentage of the SLO.
          format: double
        error_budget_remaining:
          type: integer
          description: >-
            Error Budget Remaining of the SLO. The unit is "Minutes" if the
            Evaluation type is Window, for Request based it's "Request".
          format: int32
        total_error_budget:
          type: integer
          description: >-
            Total Error Budget of the SLO. The unit is "Minutes" if the
            Evaluation type is Window, for Request based it's "Request".
          format: int32
        slo_target_type:
          $ref: '#/components/schemas/SLOTargetType'
        slo_type:
          $ref: '#/components/schemas/ServiceLevelObjectiveType'
        slo_target_percentage:
          type: number
          description: Target Percentage of the SLO defined by the user.
          format: double
        no_of_active_alerts:
          type: integer
          description: Number of Notification Rules defined for the SLO.
          format: int32
        evaluation_type:
          $ref: '#/components/schemas/SLIEvaluationType'
        downtime_status_details:
          $ref: '#/components/schemas/DowntimeStatusDetails'
        project_params:
          $ref: '#/components/schemas/ProjectParams'
        slo_error:
          $ref: '#/components/schemas/SLOError'
        error_budget_risk:
          type: string
          description: >-
            Error Budget Risk for the SLO. - It's Healthy if Error Budget
            Remaining Percentage >= 75. - It's Observe if Error Budget Remaining
            Percentage >= 50 < 75. - It's Need Attention if Error Budget
            Remaining Percentage >= 25 < 50. - It's Unhealthy if Error Budget
            Remaining Percentage >= 0 < 25. - It's Exhausted if Error Budget
            Remaining Percentage < 0. 
      description: Health List View of SLO.
