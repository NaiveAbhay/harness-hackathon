              type: boolean
              description: Manually entered Secret Engine.
            secretEngineName:
              type: string
              description: Name of the Secret Engine.
            appRoleId:
              type: string
              description: ID of App Role.
            secretId:
              type: string
              description: ID of the Secret.
            secretEngineVersion:
              type: integer
              description: Version of Secret Engine.
              format: int32
            delegateSelectors:
              uniqueItems: true
              type: array
              description: >-
                List of Delegate Selectors that belong to the same Delegate and
                are used to connect to the Secret Manager.
              items:
                type: string
                description: >-
                  List of Delegate Selectors that belong to the same Delegate
                  and are used to connect to the Secret Manager.
            namespace:
              type: string
              description: This is the Vault namespace where Secret will be created.
            sinkPath:
              type: string
              description: This is the location at which auth token is to be read from.
            useVaultAgent:
              type: boolean
              description: >-
                Boolean value to indicate if Vault Agent is used for
                authentication.
            useAwsIam:
              type: boolean
              description: Boolean value to indicate if Aws Iam is used for authentication.
            awsRegion:
              type: string
              description: This is the Aws region where aws iam auth will happen.
            vaultAwsIamRole:
              type: string
              description: >-
                This is the Vault role defined to bind to aws iam account/role
                being accessed.
            useK8sAuth:
              type: boolean
              description: >-
                Boolean value to indicate if K8s Auth is used for
                authentication.
            vaultK8sAuthRole:
              type: string
              description: This is the role where K8s auth will happen.
            serviceAccountTokenPath:
              type: string
              description: >-
                This is the SA token path where the token is mounted in the K8s
                Pod.
            k8sAuthEndpoint:
              type: string
              description: This is the path where kubernetes auth is enabled in Vault.
            renewAppRoleToken:
              type: boolean
              description: >-
                Boolean value to indicate if appRole token renewal is enabled or
                not.
            enableCache:
              type: boolean
              description: >-
                Boolean value to indicate if cache is enabled for App Role
                Token.
            readOnly:
              type: boolean
            default:
              type: boolean
            accessType:
              type: string
              enum:
                - APP_ROLE
                - TOKEN
                - VAULT_AGENT
                - AWS_IAM
                - K8s_AUTH
            xvaultAwsIamServerId:
              type: string
              description: >-
                This is the Aws Iam Header Server ID that has been configured
                for this Aws Iam instance.
