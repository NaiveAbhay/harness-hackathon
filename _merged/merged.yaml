  '/cv/api/v1/orgs/{org}/projects/{project}/slo':
    get:
      tags:
        - ServiceLevelObjective
        - SLOs
      summary: List SLOs
      description: Returns a list of Service Level Objectives
      operationId: listSlo
      parameters:
        - name: org
          in: path
          description: Organization identifier
          required: true
          schema:
            type: string
        - name: project
          in: path
          description: Project identifier
          required: true
          schema:
            type: string
        - name: Harness-Account
          in: header
          description: >-
            Identifier field of the account the resource is scoped to. This is
            required for Authorization methods other than the x-api-key header.
            If you are using the x-api-key header, this can be skipped.
          schema:
            type: string
        - name: page
          in: query
          description: >-
            Pagination page number strategy: Specify the page number within the
            paginated collection related to the number of items on each page.
          schema:
            type: integer
            format: int32
            default: 0
        - name: limit
          in: query
          description: 'Pagination: Number of items to return.'
          schema:
            maximum: 100
            type: integer
            format: int32
            default: 20
        - name: composite_slo_identifier
          in: query
          description: >-
            Identifier for the Composite SLO for which underlying SLOs needs to
            be listed.
          schema:
            type: string
        - name: monitored_service_identifier
          in: query
          description: For filtering on the basis of monitored service identifier
          schema:
            type: string
        - name: user_journey_identifiers
          in: query
          description: >-
            List of User Journey identifiers on the basis of which the SLOs are
            filtered.
          schema:
            type: array
            items:
              type: string
        - name: filter
          in: query
          description: SLO Name on the basis of which the SLOs are filtered.
          schema:
            maxLength: 128
            minLength: 1
            pattern: '^[a-zA-Z_][0-9a-zA-Z-_ ]{0,127}$'
            type: string
        - name: slo_type
          in: query
          description: SLO Types on the basis of which the SLOs are filtered.
          schema:
            maxLength: 1024
            minLength: 0
            type: string
        - name: env_identifiers
          in: query
          description: >-
            Identifiers of Environments on the basis of which the SLOs are
            filtered.
          schema:
            maxItems: 128
            minItems: 0
            type: array
            items:
              type: string
        - name: target_types
          in: query
          description: Target Types on the basis of which the SLOs are filtered.
          schema:
            type: array
            items:
              type: string
        - name: error_budget_risks
          in: query
          description: Error Budgets on the basis of which the SLOs are filtered.
          schema:
            type: array
            items:
              type: string
        - name: evaluation_type
          in: query
          description: Evaluation Type on the basis of which the SLOs are filtered.
          schema:
            type: string
        - name: child_resource
          in: query
          description: >-
            For filtering the simple slo&#x27;s on the basis of accountId. Set
            it to true for Account Level SLOs.
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: SLO List Response body
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SLOHealthListView'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
        '502':
          description: Bad Gateway
      security:
        - x-api-key: []
