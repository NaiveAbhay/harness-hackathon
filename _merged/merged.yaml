          description: >-
            How the the flag has been included, either directly or via a custom
            rule
          enum:
            - DIRECT
            - CONDITION
          type: string
        variation:
          description: >-
            The identifier for the variation of the flag that should be served
            to members of the group
          type: string
      required:
        - identifier
        - type
        - project
        - environment
        - name
        - variation
      type: object
