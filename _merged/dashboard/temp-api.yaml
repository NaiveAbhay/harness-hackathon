components:
  schemas:
    DashboardDownloadResponse:
      properties:
        file:
          format: byte
          type: string
      type: object
    ErrorResponse:
      properties:
        error:
          type: string
        responseMessages:
          type: string
      type: object
info:
  title: Dashboards Open API
  version: 1.0.0
openapi: 3.0.2
paths:
  '/api/dashboards/{dashboard_id}/download':
    get:
      description: Download the data of all tiles within a Dashboard.
      operationId: get_dashboard_data
      parameters:
        - in: path
          name: dashboard_id
          required: true
          schema:
            type: string
        - in: query
          name: file_type
          required: true
          schema:
            enum:
              - csv
            type: string
        - schema:
            type: string
          in: query
          name: filters
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardDownloadResponse'
          description: Returns files of a specified type within a ZIP file for each tile within a Dashboard.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Please specify a valid File Type.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Dashboard not found.
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unexpected error.
      summary: Download data within a Dashboard
      tags:
        - Custom Dashboards