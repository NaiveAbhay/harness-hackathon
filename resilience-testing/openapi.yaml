            If unspecified, each key-value pair in the Data field of the referenced
            Secret will be projected into the volume as a file whose name is the
            key and content is the value. If specified, the listed keys will be
            projected into the specified paths, and unlisted keys will not be
            present. If a key is specified which is not present in the Secret,
            the volume setup will error unless it is marked optional. Paths must be
            relative and may not contain the '..' path or start with '..'.
            +optional
          type: array
          items:
            $ref: '#/components/schemas/v1.KeyToPath'
        name:
          description: |-
            Name of the referent.
            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
            TODO: Add other useful fields. apiVersion, kind, uid?
            +optional
          type: string
        optional:
          description: |-
            Specify whether the Secret or its key must be defined
            +optional
          type: boolean
    v1.SecretVolumeSource:
      type: object
      properties:
        defaultMode:
          description: |-
            Optional: mode bits used to set permissions on created files by default.
            Must be an octal value between 0000 and 0777 or a decimal value between 0 and 511.
            YAML accepts both octal and decimal values, JSON requires decimal values
            for mode bits. Defaults to 0644.
            Directories within the path are not affected by this setting.
            This might be in conflict with other options that affect the file
            mode, like fsGroup, and the result can be other mode bits set.
            +optional
          type: integer
        items:
          description: |-
            If unspecified, each key-value pair in the Data field of the referenced
            Secret will be projected into the volume as a file whose name is the
            key and content is the value. If specified, the listed keys will be
            projected into the specified paths, and unlisted keys will not be
            present. If a key is specified which is not present in the Secret,
            the volume setup will error unless it is marked optional. Paths must be
            relative and may not contain the '..' path or start with '..'.
            +optional
          type: array
          items:
            $ref: '#/components/schemas/v1.KeyToPath'
        optional:
          description: |-
            Specify whether the Secret or its keys must be defined
            +optional
          type: boolean
        secretName:
          description: |-
            Name of the secret in the pod's namespace to use.
            More info: https://kubernetes.io/docs/concepts/storage/volumes#secret
            +optional
          type: string
    v1.SecurityContext:
      type: object
      properties:
        allowPrivilegeEscalation:
          description: |-
            AllowPrivilegeEscalation controls whether a process can gain more
            privileges than its parent process. This bool directly controls if
            the no_new_privs flag will be set on the container process.
            AllowPrivilegeEscalation is true always when the container is:
            1) run as Privileged
            2) has CAP_SYS_ADMIN
            +optional
          type: boolean
        capabilities:
          description: |-
            The capabilities to add/drop when running containers.
            Defaults to the default set of capabilities granted by the container runtime.
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.Capabilities'
        privileged:
          description: |-
            Run container in privileged mode.
            Processes in privileged containers are essentially equivalent to root on the host.
            Defaults to false.
            +optional
          type: boolean
        procMount:
          description: |-
            procMount denotes the type of proc mount to use for the containers.
            The default is DefaultProcMount which uses the container runtime defaults for
            readonly paths and masked paths.
            This requires the ProcMountType feature flag to be enabled.
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.ProcMountType'
        readOnlyRootFilesystem:
          description: |-
            Whether this container has a read-only root filesystem.
            Default is false.
            +optional
          type: boolean
        runAsGroup:
          description: |-
            The GID to run the entrypoint of the container process.
            Uses runtime default if unset.
            May also be set in PodSecurityContext.  If set in both SecurityContext and
            PodSecurityContext, the value specified in SecurityContext takes precedence.
            +optional
          type: integer
        runAsNonRoot:
          description: |-
            Indicates that the container must run as a non-root user.
            If true, the Kubelet will validate the image at runtime to ensure that it
            does not run as UID 0 (root) and fail to start the container if it does.
            If unset or false, no such validation will be performed.
            May also be set in PodSecurityContext.  If set in both SecurityContext and
            PodSecurityContext, the value specified in SecurityContext takes precedence.
            +optional
          type: boolean
        runAsUser:
          description: |-
            The UID to run the entrypoint of the container process.
            Defaults to user specified in image metadata if unspecified.
            May also be set in PodSecurityContext.  If set in both SecurityContext and
            PodSecurityContext, the value specified in SecurityContext takes precedence.
            +optional
          type: integer
        seLinuxOptions:
          description: |-
            The SELinux context to be applied to the container.
            If unspecified, the container runtime will allocate a random SELinux context for each
            container.  May also be set in PodSecurityContext.  If set in both SecurityContext and
            PodSecurityContext, the value specified in SecurityContext takes precedence.
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.SELinuxOptions'
        seccompProfile:
          description: |-
            The seccomp options to use by this container. If seccomp options are
            provided at both the pod & container level, the container options
            override the pod options.
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.SeccompProfile'
        windowsOptions:
          description: |-
            The Windows specific settings applied to all containers.
            If unspecified, the options from the PodSecurityContext will be used.
            If set in both SecurityContext and PodSecurityContext, the value specified in SecurityContext takes precedence.
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.WindowsSecurityContextOptions'
    v1.ServiceAccountTokenProjection:
      type: object
      properties:
        audience:
          description: |-
            Audience is the intended audience of the token. A recipient of a token
            must identify itself with an identifier specified in the audience of the
            token, and otherwise should reject the token. The audience defaults to the
            identifier of the apiserver.
            +optional
          type: string
        expirationSeconds:
          description: |-
            ExpirationSeconds is the requested duration of validity of the service
            account token. As the token approaches expiration, the kubelet volume
            plugin will proactively rotate the service account token. The kubelet will
            start trying to rotate the token if the token is older than 80 percent of
            its time to live or if the token is older than 24 hours.Defaults to 1 hour
            and must be at least 10 minutes.
            +optional
          type: integer
        path:
          description: |-
            Path is the path relative to the mount point of the file to project the
            token into.
          type: string
    v1.ServiceAffinity:
      type: string
      enum:
        - ClientIP
        - None
      x-enum-varnames:
        - ServiceAffinityClientIP
        - ServiceAffinityNone
    v1.ServiceExternalTrafficPolicyType:
      type: string
      enum:
        - Local
        - Cluster
      x-enum-varnames:
        - ServiceExternalTrafficPolicyTypeLocal
        - ServiceExternalTrafficPolicyTypeCluster
    v1.ServiceInternalTrafficPolicyType:
      type: string
      enum:
        - Cluster
        - Local
      x-enum-varnames:
        - ServiceInternalTrafficPolicyCluster
        - ServiceInternalTrafficPolicyLocal
    v1.ServicePort:
      type: object
      properties:
        appProtocol:
          description: |-
            The application protocol for this port.
            This field follows standard Kubernetes label syntax.
            Un-prefixed names are reserved for IANA standard service names (as per
            RFC-6335 and http://www.iana.org/assignments/service-names).
            Non-standard protocols should use prefixed names such as
            mycompany.com/my-custom-protocol.
            This is a beta field that is guarded by the ServiceAppProtocol feature
            gate and enabled by default.
            +optional
          type: string
        name:
          description: |-
            The name of this port within the service. This must be a DNS_LABEL.
            All ports within a ServiceSpec must have unique names. When considering
            the endpoints for a Service, this must match the 'name' field in the
            EndpointPort.
            Optional if only one ServicePort is defined on this service.
            +optional
          type: string
        nodePort:
          description: |-
            The port on each node on which this service is exposed when type is
            NodePort or LoadBalancer.  Usually assigned by the system. If a value is
            specified, in-range, and not in use it will be used, otherwise the
            operation will fail.  If not specified, a port will be allocated if this
            Service requires one.  If this field is specified when creating a
            Service which does not need it, creation will fail. This field will be
            wiped when updating a Service to no longer need it (e.g. changing type
            from NodePort to ClusterIP).
            More info: https://kubernetes.io/docs/concepts/services-networking/service/#type-nodeport
            +optional
          type: integer
        port:
          description: The port that will be exposed by this service.
          type: integer
        protocol:
          description: |-
            The IP protocol for this port. Supports "TCP", "UDP", and "SCTP".
            Default is TCP.
            +default="TCP"
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.Protocol'
        targetPort:
          description: |-
            Number or name of the port to access on the pods targeted by the service.
            Number must be in the range 1 to 65535. Name must be an IANA_SVC_NAME.
            If this is a string, it will be looked up as a named port in the
            target Pod's container ports. If this is not specified, the value
            of the 'port' field is used (an identity map).
            This field is ignored for services with clusterIP=None, and should be
            omitted or set equal to the 'port' field.
            More info: https://kubernetes.io/docs/concepts/services-networking/service/#defining-a-service
            +optional
          allOf:
            - $ref: '#/components/schemas/intstr.IntOrString'
    v1.ServiceSpec:
      type: object
      properties:
        allocateLoadBalancerNodePorts:
          description: |-
            allocateLoadBalancerNodePorts defines if NodePorts will be automatically
            allocated for services with type LoadBalancer.  Default is "true". It may be
            set to "false" if the cluster load-balancer does not rely on NodePorts.
            allocateLoadBalancerNodePorts may only be set for services with type LoadBalancer
            and will be cleared if the type is changed to any other type.
            This field is alpha-level and is only honored by servers that enable the ServiceLBNodePortControl feature.
            +optional
          type: boolean
        clusterIP:
          description: |-
            clusterIP is the IP address of the service and is usually assigned
            randomly. If an address is specified manually, is in-range (as per
            system configuration), and is not in use, it will be allocated to the
            service; otherwise creation of the service will fail. This field may not
            be changed through updates unless the type field is also being changed
            to ExternalName (which requires this field to be blank) or the type
            field is being changed from ExternalName (in which case this field may
            optionally be specified, as describe above).  Valid values are "None",
            empty string (""), or a valid IP address. Setting this to "None" makes a
            "headless service" (no virtual IP), which is useful when direct endpoint
            connections are preferred and proxying is not required.  Only applies to
            types ClusterIP, NodePort, and LoadBalancer. If this field is specified
            when creating a Service of type ExternalName, creation will fail. This
            field will be wiped when updating a Service to type ExternalName.
            More info: https://kubernetes.io/docs/concepts/services-networking/service/#virtual-ips-and-service-proxies
            +optional
          type: string
        clusterIPs:
          description: |-
            ClusterIPs is a list of IP addresses assigned to this service, and are
            usually assigned randomly.  If an address is specified manually, is
            in-range (as per system configuration), and is not in use, it will be
            allocated to the service; otherwise creation of the service will fail.
            This field may not be changed through updates unless the type field is
            also being changed to ExternalName (which requires this field to be
            empty) or the type field is being changed from ExternalName (in which
            case this field may optionally be specified, as describe above).  Valid
            values are "None", empty string (""), or a valid IP address.  Setting
            this to "None" makes a "headless service" (no virtual IP), which is
            useful when direct endpoint connections are preferred and proxying is
            not required.  Only applies to types ClusterIP, NodePort, and
            LoadBalancer. If this field is specified when creating a Service of type
            ExternalName, creation will fail. This field will be wiped when updating
            a Service to type ExternalName.  If this field is not specified, it will
            be initialized from the clusterIP field.  If this field is specified,
            clients must ensure that clusterIPs[0] and clusterIP have the same
            value.

            Unless the "IPv6DualStack" feature gate is enabled, this field is
            limited to one value, which must be the same as the clusterIP field.  If
            the feature gate is enabled, this field may hold a maximum of two
            entries (dual-stack IPs, in either order).  These IPs must correspond to
            the values of the ipFamilies field. Both clusterIPs and ipFamilies are
            governed by the ipFamilyPolicy field.
            More info: https://kubernetes.io/docs/concepts/services-networking/service/#virtual-ips-and-service-proxies
            +listType=atomic
            +optional
          type: array
          items:
            type: string
        externalIPs:
          description: |-
            externalIPs is a list of IP addresses for which nodes in the cluster
            will also accept traffic for this service.  These IPs are not managed by
            Kubernetes.  The user is responsible for ensuring that traffic arrives
            at a node with this IP.  A common example is external load-balancers
            that are not part of the Kubernetes system.
            +optional
          type: array
          items:
            type: string
        externalName:
          description: |-
            externalName is the external reference that discovery mechanisms will
            return as an alias for this service (e.g. a DNS CNAME record). No
            proxying will be involved.  Must be a lowercase RFC-1123 hostname
            (https://tools.ietf.org/html/rfc1123) and requires `type` to be "ExternalName".
            +optional
          type: string
        externalTrafficPolicy:
          description: |-
            externalTrafficPolicy denotes if this Service desires to route external
            traffic to node-local or cluster-wide endpoints. "Local" preserves the
            client source IP and avoids a second hop for LoadBalancer and Nodeport
            type services, but risks potentially imbalanced traffic spreading.
            "Cluster" obscures the client source IP and may cause a second hop to
            another node, but should have good overall load-spreading.
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.ServiceExternalTrafficPolicyType'
        healthCheckNodePort:
          description: |-
            healthCheckNodePort specifies the healthcheck nodePort for the service.
            This only applies when type is set to LoadBalancer and
            externalTrafficPolicy is set to Local. If a value is specified, is
            in-range, and is not in use, it will be used.  If not specified, a value
            will be automatically allocated.  External systems (e.g. load-balancers)
            can use this port to determine if a given node holds endpoints for this
            service or not.  If this field is specified when creating a Service
            which does not need it, creation will fail. This field will be wiped
            when updating a Service to no longer need it (e.g. changing type).
            +optional
          type: integer
        internalTrafficPolicy:
          description: |-
            InternalTrafficPolicy specifies if the cluster internal traffic
            should be routed to all endpoints or node-local endpoints only.
            "Cluster" routes internal traffic to a Service to all endpoints.
            "Local" routes traffic to node-local endpoints only, traffic is
            dropped if no node-local endpoints are ready.
            The default value is "Cluster".
            +featureGate=ServiceInternalTrafficPolicy
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.ServiceInternalTrafficPolicyType'
        ipFamilies:
          description: |-
            IPFamilies is a list of IP families (e.g. IPv4, IPv6) assigned to this
            service, and is gated by the "IPv6DualStack" feature gate.  This field
            is usually assigned automatically based on cluster configuration and the
            ipFamilyPolicy field. If this field is specified manually, the requested
            family is available in the cluster, and ipFamilyPolicy allows it, it
            will be used; otherwise creation of the service will fail.  This field
            is conditionally mutable: it allows for adding or removing a secondary
            IP family, but it does not allow changing the primary IP family of the
            Service.  Valid values are "IPv4" and "IPv6".  This field only applies
            to Services of types ClusterIP, NodePort, and LoadBalancer, and does
            apply to "headless" services.  This field will be wiped when updating a
            Service to type ExternalName.

            This field may hold a maximum of two entries (dual-stack families, in
            either order).  These families must correspond to the values of the
            clusterIPs field, if specified. Both clusterIPs and ipFamilies are
            governed by the ipFamilyPolicy field.
            +listType=atomic
            +optional
          type: array
          items:
            $ref: '#/components/schemas/v1.IPFamily'
        ipFamilyPolicy:
          description: |-
            IPFamilyPolicy represents the dual-stack-ness requested or required by
            this Service, and is gated by the "IPv6DualStack" feature gate.  If
            there is no value provided, then this field will be set to SingleStack.
            Services can be "SingleStack" (a single IP family), "PreferDualStack"
            (two IP families on dual-stack configured clusters or a single IP family
            on single-stack clusters), or "RequireDualStack" (two IP families on
            dual-stack configured clusters, otherwise fail). The ipFamilies and
            clusterIPs fields depend on the value of this field.  This field will be
            wiped when updating a service to type ExternalName.
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.IPFamilyPolicyType'
        loadBalancerClass:
          description: |-
            loadBalancerClass is the class of the load balancer implementation this Service belongs to.
            If specified, the value of this field must be a label-style identifier, with an optional prefix,
            e.g. "internal-vip" or "example.com/internal-vip". Unprefixed names are reserved for end-users.
            This field can only be set when the Service type is 'LoadBalancer'. If not set, the default load
            balancer implementation is used, today this is typically done through the cloud provider integration,
            but should apply for any default implementation. If set, it is assumed that a load balancer
            implementation is watching for Services with a matching class. Any default load balancer
            implementation (e.g. cloud providers) should ignore Services that set this field.
            This field can only be set when creating or updating a Service to type 'LoadBalancer'.
            Once set, it can not be changed. This field will be wiped when a service is updated to a non 'LoadBalancer' type.
            +featureGate=LoadBalancerClass
            +optional
          type: string
        loadBalancerIP:
          description: |-
            Only applies to Service Type: LoadBalancer
            LoadBalancer will get created with the IP specified in this field.
            This feature depends on whether the underlying cloud-provider supports specifying
            the loadBalancerIP when a load balancer is created.
            This field will be ignored if the cloud-provider does not support the feature.
            +optional
          type: string
        loadBalancerSourceRanges:
          description: |-
            If specified and supported by the platform, this will restrict traffic through the cloud-provider
            load-balancer will be restricted to the specified client IPs. This field will be ignored if the
            cloud-provider does not support the feature."
            More info: https://kubernetes.io/docs/tasks/access-application-cluster/configure-cloud-provider-firewall/
            +optional
          type: array
          items:
            type: string
        ports:
          description: |-
            The list of ports that are exposed by this service.
            More info: https://kubernetes.io/docs/concepts/services-networking/service/#virtual-ips-and-service-proxies
            +patchMergeKey=port
            +patchStrategy=merge
            +listType=map
            +listMapKey=port
            +listMapKey=protocol
          type: array
          items:
            $ref: '#/components/schemas/v1.ServicePort'
        publishNotReadyAddresses:
          description: |-
            publishNotReadyAddresses indicates that any agent which deals with endpoints for this
            Service should disregard any indications of ready/not-ready.
            The primary use case for setting this field is for a StatefulSet's Headless Service to
            propagate SRV DNS records for its Pods for the purpose of peer discovery.
            The Kubernetes controllers that generate Endpoints and EndpointSlice resources for
            Services interpret this to mean that all endpoints are considered "ready" even if the
            Pods themselves are not. Agents which consume only Kubernetes generated endpoints
            through the Endpoints or EndpointSlice resources can safely assume this behavior.
            +optional
          type: boolean
        selector:
          description: |-
            Route service traffic to pods with label keys and values matching this
            selector. If empty or not present, the service is assumed to have an
            external process managing its endpoints, which Kubernetes will not
            modify. Only applies to types ClusterIP, NodePort, and LoadBalancer.
            Ignored if type is ExternalName.
            More info: https://kubernetes.io/docs/concepts/services-networking/service/
            +optional
          type: object
          additionalProperties:
            type: string
        sessionAffinity:
          description: |-
            Supports "ClientIP" and "None". Used to maintain session affinity.
            Enable client IP based session affinity.
            Must be ClientIP or None.
            Defaults to None.
            More info: https://kubernetes.io/docs/concepts/services-networking/service/#virtual-ips-and-service-proxies
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.ServiceAffinity'
        sessionAffinityConfig:
          description: |-
            sessionAffinityConfig contains the configurations of session affinity.
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.SessionAffinityConfig'
        topologyKeys:
          description: |-
            topologyKeys is a preference-order list of topology keys which
            implementations of services should use to preferentially sort endpoints
            when accessing this Service, it can not be used at the same time as
            externalTrafficPolicy=Local.
            Topology keys must be valid label keys and at most 16 keys may be specified.
            Endpoints are chosen based on the first topology key with available backends.
            If this field is specified and all entries have no backends that match
            the topology of the client, the service has no backends for that client
            and connections should fail.
            The special value "*" may be used to mean "any topology". This catch-all
            value, if used, only makes sense as the last value in the list.
            If this is not specified or empty, no topology constraints will be applied.
            This field is alpha-level and is only honored by servers that enable the ServiceTopology feature.
            This field is deprecated and will be removed in a future version.
            +optional
          type: array
          items:
            type: string
        type:
          description: |-
            type determines how the Service is exposed. Defaults to ClusterIP. Valid
            options are ExternalName, ClusterIP, NodePort, and LoadBalancer.
            "ClusterIP" allocates a cluster-internal IP address for load-balancing
            to endpoints. Endpoints are determined by the selector or if that is not
            specified, by manual construction of an Endpoints object or
            EndpointSlice objects. If clusterIP is "None", no virtual IP is
            allocated and the endpoints are published as a set of endpoints rather
            than a virtual IP.
            "NodePort" builds on ClusterIP and allocates a port on every node which
            routes to the same endpoints as the clusterIP.
            "LoadBalancer" builds on NodePort and creates an external load-balancer
            (if supported in the current cloud) which routes to the same endpoints
            as the clusterIP.
            "ExternalName" aliases this service to the specified externalName.
            Several other fields do not apply to ExternalName services.
            More info: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.ServiceType'
    v1.ServiceStatus:
      type: object
      properties:
        conditions:
          description: |-
            Current service state
            +optional
            +patchMergeKey=type
            +patchStrategy=merge
            +listType=map
            +listMapKey=type
          type: array
          items:
            $ref: '#/components/schemas/v1.Condition'
        loadBalancer:
          description: |-
            LoadBalancer contains the current status of the load-balancer,
            if one is present.
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.LoadBalancerStatus'
    v1.ServiceType:
      type: string
      enum:
        - ClusterIP
        - NodePort
        - LoadBalancer
        - ExternalName
      x-enum-varnames:
        - ServiceTypeClusterIP
        - ServiceTypeNodePort
        - ServiceTypeLoadBalancer
        - ServiceTypeExternalName
    v1.SessionAffinityConfig:
      type: object
      properties:
        clientIP:
          description: |-
            clientIP contains the configurations of Client IP based session affinity.
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.ClientIPConfig'
    v1.SourceDetails:
      type: object
      properties:
        annotations:
          description: Annotations for the source pod
          type: object
          additionalProperties:
            type: string
        args:
          description: Args for the source pod
          type: array
          items:
            type: string
        command:
          description: Command for the source pod
          type: array
          items:
            type: string
        env:
          description: ENVList contains ENV passed to the source pod
          type: array
          items:
            $ref: '#/components/schemas/k8s_io_api_core_v1.EnvVar'
        hostNetwork:
          description: |-
            HostNetwork define the hostNetwork of the external pod
            it supports boolean values and default value is false
          type: boolean
        image:
          description: Image for the source pod
          type: string
        imagePullPolicy:
          description: ImagePullPolicy for the source pod
          allOf:
            - $ref: '#/components/schemas/v1.PullPolicy'
        imagePullSecrets:
          description: ImagePullSecrets for source pod
          type: array
          items:
            $ref: '#/components/schemas/v1.LocalObjectReference'
        inheritInputs:
          description: |-
            InheritInputs defined to inherit experiment pod attributes(ENV, volumes, and volumeMounts) into probe pod
            it supports boolean values and default value is false
          type: boolean
        labels:
          description: Labels for the source pod
          type: object
          additionalProperties:
            type: string
        nodeSelector:
          description: NodeSelector for the source pod
          type: object
          additionalProperties:
            type: string
        privileged:
          description: Privileged for the source pod
          type: boolean
        tolerations:
          type: array
          items:
            $ref: '#/components/schemas/v1.Toleration'
        volumeMount:
          description: VolumesMount for the source pod
          type: array
          items:
            $ref: '#/components/schemas/v1.VolumeMount'
        volumes:
          description: Volumes for the source pod
          type: array
          items:
            $ref: '#/components/schemas/v1.Volume'
    v1.SplunkObservabilityInputs:
      type: object
      properties:
        endpoint:
          description: Endpoint for the Splunk Observability probe
          type: string
        splunkObservabilityMetrics:
          description: SplunkObservabilityMetrics contains the splunk observability metrics
          allOf:
            - $ref: '#/components/schemas/v1.SplunkObservabilityMetrics'
    v1.SplunkObservabilityMetrics:
      type: object
      properties:
        durationInMin:
          description: DurationInMin contains the duration in minutes
          type: integer
        query:
          description: Query contains the query for the metrics
          type: string
    v1.StorageMedium:
      type: string
      enum:
        - ''
        - Memory
        - HugePages
        - HugePages-
      x-enum-comments:
        StorageMediumDefault: 'use whatever the default is for the node, assume anything we don''t explicitly handle is this'
        StorageMediumHugePages: use hugepages
        StorageMediumHugePagesPrefix: prefix for full medium notation HugePages-<size>
        StorageMediumMemory: use memory (e.g. tmpfs on linux)
      x-enum-varnames:
        - StorageMediumDefault
        - StorageMediumMemory
        - StorageMediumHugePages
        - StorageMediumHugePagesPrefix
    v1.StorageOSVolumeSource:
      type: object
      properties:
        fsType:
          description: |-
            Filesystem type to mount.
            Must be a filesystem type supported by the host operating system.
            Ex. "ext4", "xfs", "ntfs". Implicitly inferred to be "ext4" if unspecified.
            +optional
          type: string
        readOnly:
          description: |-
            Defaults to false (read/write). ReadOnly here will force
            the ReadOnly setting in VolumeMounts.
            +optional
          type: boolean
        secretRef:
          description: |-
            SecretRef specifies the secret to use for obtaining the StorageOS API
            credentials.  If not specified, default values will be attempted.
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.LocalObjectReference'
        volumeName:
          description: |-
            VolumeName is the human-readable name of the StorageOS volume.  Volume
            names are only unique within a namespace.
          type: string
        volumeNamespace:
          description: |-
            VolumeNamespace specifies the scope of the volume within StorageOS.  If no
            namespace is specified then the Pod's namespace will be used.  This allows the
            Kubernetes name scoping to be mirrored within StorageOS for tighter integration.
            Set VolumeName to any name to override the default behaviour.
            Set to "default" if you are not using namespaces within StorageOS.
            Namespaces that do not pre-exist within StorageOS will be created.
            +optional
          type: string
    v1.Sysctl:
      type: object
      properties:
        name:
          description: Name of a property to set
          type: string
        value:
          description: Value of a property to set
          type: string
    v1.TaintEffect:
      type: string
      enum:
        - NoSchedule
        - PreferNoSchedule
        - NoExecute
      x-enum-varnames:
        - TaintEffectNoSchedule
        - TaintEffectPreferNoSchedule
        - TaintEffectNoExecute
    v1.Toleration:
      type: object
      properties:
        effect:
          description: |-
            Effect indicates the taint effect to match. Empty means match all taint effects.
            When specified, allowed values are NoSchedule, PreferNoSchedule and NoExecute.
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.TaintEffect'
        key:
          description: |-
            Key is the taint key that the toleration applies to. Empty means match all taint keys.
            If the key is empty, operator must be Exists; this combination means to match all values and all keys.
            +optional
          type: string
        operator:
          description: |-
            Operator represents a key's relationship to the value.
            Valid operators are Exists and Equal. Defaults to Equal.
            Exists is equivalent to wildcard for value, so that a pod can
            tolerate all taints of a particular category.
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.TolerationOperator'
        tolerationSeconds:
          description: |-
            TolerationSeconds represents the period of time the toleration (which must be
            of effect NoExecute, otherwise this field is ignored) tolerates the taint. By default,
            it is not set, which means tolerate the taint forever (do not evict). Zero and
            negative values will be treated as 0 (evict immediately) by the system.
            +optional
          type: integer
        value:
          description: |-
            Value is the taint value the toleration matches to.
            If the operator is Exists, the value should be empty, otherwise just a regular string.
            +optional
          type: string
    v1.TolerationOperator:
      type: string
      enum:
        - Exists
        - Equal
      x-enum-varnames:
        - TolerationOpExists
        - TolerationOpEqual
    v1.TypedLocalObjectReference:
      type: object
      properties:
        apiGroup:
          description: |-
            APIGroup is the group for the resource being referenced.
            If APIGroup is not specified, the specified Kind must be in the core API group.
            For any other third-party types, APIGroup is required.
            +optional
          type: string
        kind:
          description: Kind is the type of resource being referenced
          type: string
        name:
          description: Name is the name of resource being referenced
          type: string
    v1.Volume:
      type: object
      properties:
        awsElasticBlockStore:
          description: |-
            AWSElasticBlockStore represents an AWS Disk resource that is attached to a
            kubelet's host machine and then exposed to the pod.
            More info: https://kubernetes.io/docs/concepts/storage/volumes#awselasticblockstore
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.AWSElasticBlockStoreVolumeSource'
        azureDisk:
          description: |-
            AzureDisk represents an Azure Data Disk mount on the host and bind mount to the pod.
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.AzureDiskVolumeSource'
        azureFile:
          description: |-
            AzureFile represents an Azure File Service mount on the host and bind mount to the pod.
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.AzureFileVolumeSource'
        cephfs:
          description: |-
            CephFS represents a Ceph FS mount on the host that shares a pod's lifetime
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.CephFSVolumeSource'
        cinder:
          description: |-
            Cinder represents a cinder volume attached and mounted on kubelets host machine.
            More info: https://examples.k8s.io/mysql-cinder-pd/README.md
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.CinderVolumeSource'
        configMap:
          description: |-
            ConfigMap represents a configMap that should populate this volume
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.ConfigMapVolumeSource'
        csi:
          description: |-
            CSI (Container Storage Interface) represents ephemeral storage that is handled by certain external CSI drivers (Beta feature).
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.CSIVolumeSource'
        downwardAPI:
          description: |-
            DownwardAPI represents downward API about the pod that should populate this volume
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.DownwardAPIVolumeSource'
        emptyDir:
          description: |-
            EmptyDir represents a temporary directory that shares a pod's lifetime.
            More info: https://kubernetes.io/docs/concepts/storage/volumes#emptydir
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.EmptyDirVolumeSource'
        ephemeral:
          description: |-
            Ephemeral represents a volume that is handled by a cluster storage driver.
            The volume's lifecycle is tied to the pod that defines it - it will be created before the pod starts,
            and deleted when the pod is removed.

            Use this if:
            a) the volume is only needed while the pod runs,
            b) features of normal volumes like restoring from snapshot or capacity
               tracking are needed,
            c) the storage driver is specified through a storage class, and
            d) the storage driver supports dynamic volume provisioning through
               a PersistentVolumeClaim (see EphemeralVolumeSource for more
               information on the connection between this volume type
               and PersistentVolumeClaim).

            Use PersistentVolumeClaim or one of the vendor-specific
            APIs for volumes that persist for longer than the lifecycle
            of an individual pod.

            Use CSI for light-weight local ephemeral volumes if the CSI driver is meant to
            be used that way - see the documentation of the driver for
            more information.

            A pod can use both types of ephemeral volumes and
            persistent volumes at the same time.

            This is a beta feature and only available when the GenericEphemeralVolume
            feature gate is enabled.

            +optional
          allOf:
            - $ref: '#/components/schemas/v1.EphemeralVolumeSource'
        fc:
          description: |-
            FC represents a Fibre Channel resource that is attached to a kubelet's host machine and then exposed to the pod.
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.FCVolumeSource'
        flexVolume:
          description: |-
            FlexVolume represents a generic volume resource that is
            provisioned/attached using an exec based plugin.
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.FlexVolumeSource'
        flocker:
          description: |-
            Flocker represents a Flocker volume attached to a kubelet's host machine. This depends on the Flocker control service being running
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.FlockerVolumeSource'
        gcePersistentDisk:
          description: |-
            GCEPersistentDisk represents a GCE Disk resource that is attached to a
            kubelet's host machine and then exposed to the pod.
            More info: https://kubernetes.io/docs/concepts/storage/volumes#gcepersistentdisk
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.GCEPersistentDiskVolumeSource'
        gitRepo:
          description: |-
            GitRepo represents a git repository at a particular revision.
            DEPRECATED: GitRepo is deprecated. To provision a container with a git repo, mount an
            EmptyDir into an InitContainer that clones the repo using git, then mount the EmptyDir
            into the Pod's container.
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.GitRepoVolumeSource'
        glusterfs:
          description: |-
            Glusterfs represents a Glusterfs mount on the host that shares a pod's lifetime.
            More info: https://examples.k8s.io/volumes/glusterfs/README.md
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.GlusterfsVolumeSource'
        hostPath:
          description: |-
            HostPath represents a pre-existing file or directory on the host
            machine that is directly exposed to the container. This is generally
            used for system agents or other privileged things that are allowed
            to see the host machine. Most containers will NOT need this.
            More info: https://kubernetes.io/docs/concepts/storage/volumes#hostpath
            ---
            TODO(jonesdl) We need to restrict who can use host directory mounts and who can/can not
            mount host directories as read/write.
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.HostPathVolumeSource'
        iscsi:
          description: |-
            ISCSI represents an ISCSI Disk resource that is attached to a
            kubelet's host machine and then exposed to the pod.
            More info: https://examples.k8s.io/volumes/iscsi/README.md
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.ISCSIVolumeSource'
        name:
          description: |-
            Volume's name.
            Must be a DNS_LABEL and unique within the pod.
            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
          type: string
        nfs:
          description: |-
            NFS represents an NFS mount on the host that shares a pod's lifetime
            More info: https://kubernetes.io/docs/concepts/storage/volumes#nfs
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.NFSVolumeSource'
        persistentVolumeClaim:
          description: |-
            PersistentVolumeClaimVolumeSource represents a reference to a
            PersistentVolumeClaim in the same namespace.
            More info: https://kubernetes.io/docs/concepts/storage/persistent-volumes#persistentvolumeclaims
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.PersistentVolumeClaimVolumeSource'
        photonPersistentDisk:
          description: PhotonPersistentDisk represents a PhotonController persistent disk attached and mounted on kubelets host machine
          allOf:
            - $ref: '#/components/schemas/v1.PhotonPersistentDiskVolumeSource'
        portworxVolume:
          description: |-
            PortworxVolume represents a portworx volume attached and mounted on kubelets host machine
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.PortworxVolumeSource'
        projected:
          description: 'Items for all in one resources secrets, configmaps, and downward API'
          allOf:
            - $ref: '#/components/schemas/v1.ProjectedVolumeSource'
        quobyte:
          description: |-
            Quobyte represents a Quobyte mount on the host that shares a pod's lifetime
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.QuobyteVolumeSource'
        rbd:
          description: |-
            RBD represents a Rados Block Device mount on the host that shares a pod's lifetime.
            More info: https://examples.k8s.io/volumes/rbd/README.md
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.RBDVolumeSource'
        scaleIO:
          description: |-
            ScaleIO represents a ScaleIO persistent volume attached and mounted on Kubernetes nodes.
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.ScaleIOVolumeSource'
        secret:
          description: |-
            Secret represents a secret that should populate this volume.
            More info: https://kubernetes.io/docs/concepts/storage/volumes#secret
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.SecretVolumeSource'
        storageos:
          description: |-
            StorageOS represents a StorageOS volume attached and mounted on Kubernetes nodes.
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.StorageOSVolumeSource'
        vsphereVolume:
          description: |-
            VsphereVolume represents a vSphere volume attached and mounted on kubelets host machine
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.VsphereVirtualDiskVolumeSource'
    v1.VolumeMount:
      type: object
      properties:
        mountPath:
          description: |-
            Path within the container at which the volume should be mounted.  Must
            not contain ':'.
          type: string
        mountPropagation:
          description: |-
            mountPropagation determines how mounts are propagated from the host
            to container and the other way around.
            When not set, MountPropagationNone is used.
            This field is beta in 1.10.
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.MountPropagationMode'
        name:
          description: This must match the Name of a Volume.
          type: string
        readOnly:
          description: |-
            Mounted read-only if true, read-write otherwise (false or unspecified).
            Defaults to false.
            +optional
          type: boolean
        subPath:
          description: |-
            Path within the volume from which the container's volume should be mounted.
            Defaults to "" (volume's root).
            +optional
          type: string
        subPathExpr:
          description: |-
            Expanded path within the volume from which the container's volume should be mounted.
            Behaves similarly to SubPath but environment variable references $(VAR_NAME) are expanded using the container's environment.
            Defaults to "" (volume's root).
            SubPathExpr and SubPath are mutually exclusive.
            +optional
          type: string
    v1.VolumeProjection:
      type: object
      properties:
        configMap:
          description: |-
            information about the configMap data to project
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.ConfigMapProjection'
        downwardAPI:
          description: |-
            information about the downwardAPI data to project
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.DownwardAPIProjection'
        secret:
          description: |-
            information about the secret data to project
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.SecretProjection'
        serviceAccountToken:
          description: |-
            information about the serviceAccountToken data to project
            +optional
          allOf:
            - $ref: '#/components/schemas/v1.ServiceAccountTokenProjection'
    v1.VsphereVirtualDiskVolumeSource:
      type: object
      properties:
        fsType:
          description: |-
            Filesystem type to mount.
            Must be a filesystem type supported by the host operating system.
            Ex. "ext4", "xfs", "ntfs". Implicitly inferred to be "ext4" if unspecified.
            +optional
          type: string
        storagePolicyID:
          description: |-
            Storage Policy Based Management (SPBM) profile ID associated with the StoragePolicyName.
            +optional
          type: string
        storagePolicyName:
          description: |-
            Storage Policy Based Management (SPBM) profile name.
            +optional
          type: string
        volumePath:
          description: Path that identifies vSphere volume vmdk
          type: string
    v1.WindowsSecurityContextOptions:
      type: object
      properties:
        gmsaCredentialSpec:
          description: |-
            GMSACredentialSpec is where the GMSA admission webhook
            (https://github.com/kubernetes-sigs/windows-gmsa) inlines the contents of the
            GMSA credential spec named by the GMSACredentialSpecName field.
            +optional
          type: string
        gmsaCredentialSpecName:
          description: |-
            GMSACredentialSpecName is the name of the GMSA credential spec to use.
            +optional
          type: string
        runAsUserName:
          description: |-
            The UserName in Windows to run the entrypoint of the container process.
            Defaults to the user specified in image metadata if unspecified.
            May also be set in PodSecurityContext. If set in both SecurityContext and
            PodSecurityContext, the value specified in SecurityContext takes precedence.
            +optional
          type: string
