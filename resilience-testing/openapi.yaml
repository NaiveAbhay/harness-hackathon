  /rest/actions:
    get:
      description: 'Retrieve a list of actions based on various filters like name, tags, date range, and infrastructure type, with pagination support.'
      summary: List actions with filtering options
      operationId: listActions
      parameters:
        - description: account id that want to access the resource
          name: accountIdentifier
          in: query
          required: true
          schema:
            type: string
        - description: organization id that want to access the resource
          name: organizationIdentifier
          in: query
          required: true
          schema:
            type: string
        - description: project id that want to access the resource
          name: projectIdentifier
          in: query
          required: true
          schema:
            type: string
        - description: chaos hub identity
          name: hubIdentity
          in: query
          schema:
            type: string
        - description: name of the action
          name: search
          in: query
          required: true
          schema:
            type: string
        - description: page number
          name: page
          in: query
          required: true
          schema:
            type: integer
            default: 0
        - description: limit per page
          name: limit
          in: query
          required: true
          schema:
            type: integer
            default: 15
        - description: infra type of the action
          name: infraType
          in: query
          schema:
            type: string
        - description: filter based on Action entity type
          name: entityType
          in: query
          schema:
            type: string
        - description: include all scope
          name: includeAllScope
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved the list of Actions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/actions.ListActionTemplateResponse'
        '400':
          description: Bad request - Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.RestError'
        '401':
          description: Unauthorized - Invalid credentials or insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.RestError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.RestError'
      tags:
        - Actions
    post:
      description: Create a new action
      summary: Create a new action
      operationId: createAction
      parameters:
        - description: account id that want to access the resource
          name: accountIdentifier
          in: query
          required: true
          schema:
            type: string
        - description: organization id that want to access the resource
          name: organizationIdentifier
          in: query
          required: true
          schema:
            type: string
        - description: project id that want to access the resource
          name: projectIdentifier
          in: query
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/github_com_harness_hce-saas_graphql_server_pkg_actions.Action'
        description: action configuration
        required: true
      responses:
        '200':
          description: Successfully created Action
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_harness_hce-saas_graphql_server_pkg_actions.Action'
        '400':
          description: Bad request - Invalid input or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.RestError'
        '401':
          description: Unauthorized - Invalid credentials or insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.RestError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.RestError'
