openapi: 3.0.0
info:
  description: 'ChaosManager serves as the primary API server for the chaos module, responsible for transferring and handling requests to their respective operations'
  title: Chaos Manager
  contact: {}
  version: 1.77.3
  license:
    name: Harness Inc.
    url: https://www.harness.io
security:
  - ApiKeyAuth: []
paths:
  /api/v3/health:
    get:
      description: Health check
      tags:
        - Health
      summary: Health check
      operationId: healthCheckV3
      parameters:
        - description: correlation id is used to debug micro svc communication
          name: correlationID
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/health.HealthCheckResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/shared.Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/shared.Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/shared.Error'
  /experimentHelperImageVersion:
    get:
      description: Get experiment helper image version
      summary: Get experiment helper image version
      operationId: getExperimentHelperImageVersion
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handlers.ExperimentHelperImageVersion'
        '400':
          description: Bad Request
