  "/budgets/bulk/adjust-budget-amount":
    post:
      tags:
      - Cloud Cost Budgets
      summary: Adjust Budget Amount in Bulk
      description: |
        Adjusts multiple budget amounts in a single operation. This is an asynchronous operation that returns a job ID for tracking.        
        #### Example Request:
        ```json
        {
          "budgetIds": ["budget_123", "budget_456"],
          "adjustBudgetBulkRequestType": "INCREASE_BY_PERCENTAGE",
          "adjustmentValue": 10,
          "notes": "Q2 budget adjustment - 10% increase for all production budgets"
        }
        ```
        
        #### Adjustment Types (adjustBudgetBulkRequestType):
        - `INCREASE_BY_PERCENTAGE`: Increase budgets by a percentage (e.g., 10 = 10% increase)
        - `DECREASE_BY_PERCENTAGE`: Decrease budgets by a percentage (e.g., 5 = 5% decrease)
        - `INCREASE_BY_AMOUNT`: Increase budgets by a fixed amount
        - `DECREASE_BY_AMOUNT`: Decrease budgets by a fixed amount
        - `SET_TO_SPECIFIC_AMOUNT`: Set budgets to specific amounts (requires amountMap)
      operationId: adjustBudgetAmountOperation
      parameters:
      - name: accountIdentifier
        in: query
        description: Account Identifier for authentication and authorization.
        required: true
        schema:
          type: string
        example: abc-123-xyz
      requestBody:
        description: |
          Request body containing the budget adjustment configuration.
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/AdjustBudgetAmountRequest"
        required: true
      responses:
        '202':
          description: |
            Returns a job status object to track the operation.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - RUNNING
                      - COMPLETED
                      - FAILED
                    description: Current status of the bulk operation
                  failedBudgetIds:
                    type: array
                    items:
                      type: string
                    description: List of budget IDs that failed to process
                  successCount:
                    type: integer
                    description: Number of budgets successfully processed
                  failedCount:
                    type: integer
                    description: Number of budgets that failed to process
              example:
                status: RUNNING
                failedBudgetIds: []
                successCount: 0
                failedCount: 0
        '400':
          description: Invalid request parameters or malformed request body
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Failure"
        '500':
          description: Internal server error occurred while processing the request
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/budgets/bulk/clone":
    post:
      tags:
      - Cloud Cost Budgets
      summary: Clone Budgets in Bulk
      description: |
        Creates copies of multiple budgets with customizable naming patterns and alert configurations.
      operationId: cloneBudgetsBulkOperation
      parameters:
      - name: accountIdentifier
        in: query
        description: Account Identifier for authentication and authorization.
        required: true
        schema:
          type: string
        example: abc-123-xyz
      requestBody:
        description: Bulk clone operation details
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CloneBudgetRequest"
        required: true
      responses:
        '202':
          description: Bulk clone operation accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: SUCCESS
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum:
                          - RUNNING
                          - COMPLETED
                          - FAILED
                        description: Current status of the bulk operation
                      failedBudgetIds:
                        type: array
                        items:
                          type: string
                        description: List of budget IDs that failed to process
                      successCount:
                        type: integer
                        description: Number of budgets successfully processed
                      failedCount:
                        type: integer
                        description: Number of budgets that failed to process
                  metaData:
                    type: object
                    nullable: true
                  correlationId:
                    type: string
                    description: Unique identifier for tracking the request
              example:
                status: SUCCESS
                data:
                  status: RUNNING
                  failedBudgetIds: []
                  successCount: 0
                  failedCount: 0
                metaData: null
                correlationId: "abc-123-xyz-correlation"
        '400':
          description: Invalid request parameters or malformed request body
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Failure"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/budgets/bulk/delete":
    post:
      tags:
      - Cloud Cost Budgets
      summary: Delete Budgets in Bulk
      description: |
        Permanently deletes multiple budgets in a single operation.
        
        **⚠️ WARNING:** This action cannot be undone. Deleted budgets and their historical data will be permanently removed.
        
        **Recommendations:**
        - Double-check budget IDs before deletion
        - Consider exporting budget data before proceeding
        - Review dependent alerts and reports
      operationId: deleteBudgetsBulkOperation
      parameters:
      - name: accountIdentifier
        in: query
        description: Account Identifier for authentication and authorization.
        required: true
        schema:
          type: string
        example: abc-123-xyz
      requestBody:
        description: Bulk delete operation details
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/DeleteBudgetRequest"
        required: true
      responses:
        '202':
          description: Bulk delete operation accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: SUCCESS
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum:
                          - RUNNING
                          - COMPLETED
                          - FAILED
                        description: Current status of the bulk operation
                      failedBudgetIds:
                        type: array
                        items:
                          type: string
                        description: List of budget IDs that failed to delete
                      successCount:
                        type: integer
                        description: Number of budgets successfully deleted
                      failedCount:
                        type: integer
                        description: Number of budgets that failed to delete
                  metaData:
                    type: object
                    nullable: true
                  correlationId:
                    type: string
                    description: Unique identifier for tracking the request
              example:
                status: SUCCESS
                data:
                  status: RUNNING
                  failedBudgetIds: []
                  successCount: 0
                  failedCount: 0
                metaData: null
                correlationId: "abc-123-xyz-correlation"
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
