          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/budgets/bulk/check-job-status":
    get:
      tags:
      - Cloud Cost Budgets
      summary: Check Bulk Operation Status
      description: |
        Retrieves the current status of an asynchronous bulk budget operation. Returns the status of the most recent bulk operation for an account.
        
        **Status Values:**
        - `RUNNING`: Operation is in progress
        - `COMPLETED`: Operation finished successfully
        - `FAILED`: Operation encountered errors (check failedBudgetIds)
      operationId: checkBulkBudgetJobStatus
      parameters:
      - name: accountIdentifier
        in: query
        description: Account Identifier for authentication and authorization.
        required: true
        schema:
          type: string
        example: abc-123-xyz
      responses:
        '200':
          description: Returns the status of the most recent bulk operation for the account
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - RUNNING
                      - COMPLETED
                      - FAILED
                    description: Current status of the bulk operation
                  failedBudgetIds:
                    type: array
                    items:
                      type: string
                    description: List of budget IDs that failed to process
                  successCount:
                    type: integer
                    description: Number of budgets successfully processed
                  failedCount:
                    type: integer
                    description: Number of budgets that failed to process
              example:
                status: COMPLETED
                failedBudgetIds: ["budget_789"]
                successCount: 5
                failedCount: 1
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Failure"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/budgets/bulk/manage-alerts":
    post:
      tags:
      - Cloud Cost Budgets
      summary: Manage Budget Alerts in Bulk
      description: |
        Performs bulk operations on budget alerts including adding, updating, or removing alert configurations.
        
        **Supported Operations:**
        - Add/Update Alert Thresholds - Add new alert thresholds to budgets
        - Remove Alerts - Remove specific alert thresholds from budgets
        - Manage Notification Recipients:
          - Add email recipients
          - Remove email recipients
          - Add Slack recipients
          - Remove Slack recipients
      operationId: manageBudgetAlertsBulkOperation
      parameters:
      - name: accountIdentifier
        in: query
        description: Account Identifier for authentication and authorization.
        required: true
        schema:
          type: string
        example: abc-123-xyz
      requestBody:
        description: |
          Configuration for managing budget alerts in bulk.
          
          **Example Request:**
          ```json
          {
            "budgetIds": ["budget_123", "budget_456"],
            "operationType": "ADD_ALERTS",
            "alertThresholds": [
              {
                "percentage": 90,
                "emailAddresses": ["team@example.com"],
                "alertOn": "ACTUAL_COST"
              }
            ]
          }
          ```
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ManageBudgetAlertsRequest"
        required: true
      responses:
        '202':
          description: Bulk manage alerts operation accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: SUCCESS
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum:
