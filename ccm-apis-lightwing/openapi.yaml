          },
          {
            "name": "rule_id",
            "description": "Unique numeric identifier of the AutoStopping Rule. This ID is returned when creating a rule or can be obtained from the list rules endpoint.",
            "in": "path",
            "required": true,
            "schema": {
              "type": "number"
            },
            "example": 12345
          },
          {
            "name": "accountIdentifier",
            "description": "Account Identifier for authentication and authorization.",
