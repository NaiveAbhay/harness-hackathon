          "400": {
            "description": "Invalid status value",
            "content": {}
          }
        }
      },
      "delete": {
        "tags": [
          "AutoStopping Rules"
        ],
        "summary": "Delete an AutoStopping Rule",
        "description": "Permanently deletes an AutoStopping Rule from your account.\n\n**⚠️ CAUTION:** This action is irreversible. Once deleted, the rule configuration cannot be recovered. Resources that were managed by this rule will no longer be automatically stopped, which may result in increased cloud costs.",
        "operationId": "DeleteAutoStoppingRule",
        "parameters": [
          {
            "name": "rule_id",
            "description": "Unique identifier of the AutoStopping Rule to be deleted.",
            "in": "path",
            "required": true,
            "schema": {
              "type": "number"
            },
            "example": 12345
          },
          {
            "name": "account_id",
            "description": "Account Identifier for the Entity",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string"
            },
            "example": "abc12_DEFgh-ijkLMNOPqr"
          },
          {
            "name": "accountIdentifier",
            "description": "Account Identifier for authentication and authorization.",
            "in": "query",
            "required": true,
            "schema": {
              "type": "string"
            },
            "example": "px7xd_BFRCi"
          }
        ],
        "responses": {
          "200": {
            "description": "AutoStopping Rule deleted successfully. Returns the deleted rule details.",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ServiceResponse"
                }
              }
