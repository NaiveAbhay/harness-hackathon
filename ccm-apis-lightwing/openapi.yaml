    "/accounts/{account_id}/autostopping/rules/{rule_id}/savings": {
      "get": {
        "tags": [
          "AutoStopping Rules"
        ],
        "summary": "Return savings details for an AutoStopping Rule",
        "description": "Retrieves detailed cost savings data for a specific AutoStopping Rule grouped by day over the specified time period.",
        "operationId": "SavingsFromAutoStoppingRule",
        "parameters": [
          {
            "name": "account_id",
            "description": "Account Identifier for the Entity",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string"
            },
            "example": "abc12_DEFgh-ijkLMNOPqr"
          },
          {
            "name": "rule_id",
            "description": "Unique identifier of the AutoStopping Rule for which you want to fetch savings details",
            "in": "path",
            "required": true,
            "schema": {
              "type": "number"
            },
            "example": 12345
          },
          {
            "name": "accountIdentifier",
            "description": "Account Identifier for authentication and authorization.",
            "in": "query",
            "required": true,
            "schema": {
              "type": "string"
            },
            "example": "abc12_DEFgh-ijkLMNOPqr"
          },
          {
            "name": "from",
            "description": "Start date for the savings calculation period. Accepts YYYY-MM-DD format (e.g., 2024-01-01) or ISO 8601/RFC3339 format (e.g., 2024-01-01T00:00:00Z).",
            "in": "query",
            "schema": {
              "type": "string"
            },
            "example": "2024-01-01"
          },
          {
            "name": "to",
            "description": "End date for the savings calculation period. Accepts YYYY-MM-DD format (e.g., 2024-01-31) or ISO 8601/RFC3339 format (e.g., 2024-01-31T23:59:59Z).",
            "in": "query",
            "schema": {
              "type": "string"
            },
            "example": "2024-01-31"
          },
          {
            "name": "group_by",
            "description": "Optional parameter to group savings data by specific dimensions such as 'day', 'week', or 'month'.",
            "in": "query",
            "schema": {
              "type": "string"
            },
            "example": "day"
          }
        ],
        "responses": {
          "200": {
            "description": "Successfully retrieved savings details",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object"
                }
              }
            }
          },
          "400": {
            "description": "Invalid status value",
            "content": {}
          }
        }
      }
