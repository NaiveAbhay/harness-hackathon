      "ClusterOrchestratorConfig": {
        "type": "object",
        "description": "Configuration for cluster orchestrator",
        "required": [
          "cluster_id",
          "base_on_demand_capacity",
          "distribution_strategy",
          "on_demand_split",
          "spot_distribution",
          "spot_split",
          "consolidation"
        ],
        "properties": {
          "cluster_id": {
            "type": "string",
            "description": "Identifier of the Orchestrator of the cluster, available in list response and onboard response"
          },
          "base_on_demand_capacity": {
            "type": "integer",
            "description": "Base capacity for on-demand instances",
            "minimum": 0
          },
          "distribution_strategy": {
            "type": "string",
            "description": "Strategy for distributing workloads",
            "enum": ["CostOptimized","LeastInterrupted"]
          },
          "on_demand_split": {
            "type": "integer",
            "description": "Percentage of on-demand split for workloads",
            "minimum": 0,
            "maximum": 100
          },
          "spot_distribution": {
            "type": "string",
            "description": "Distribution strategy for spot instances",
            "enum": ["SpotReady","ALL"]
          },
          "spot_split": {
            "type": "integer",
            "description": "Percentage of spot split for workloads",
            "minimum": 0,
            "maximum": 100
          },
          "node_deletion_delay": {
            "type": "integer",
            "description": "Delay in seconds before node deletion",
            "minimum": 0
          },
          "consolidation": {
            "type": "object",
            "description": "Configuration for node consolidation",
            "required": [
              "policy",
              "budgets",
              "pod_evictor"
            ],
            "properties": {
              "policy": {
                "type": "string",
                "description": "Consolidation policy",
                "enum": ["WhenEmptyOrUnderutilized","WhenEmpty"]
              },
              "after": {
                "type": "string",
                "description": "Time after which consolidation starts"
              },
              "budgets": {
                "type": "array",
                "description": "List of consolidation budgets",
                "items": {
                  "type": "object",
                  "required": ["reasons", "nodes"],
                  "properties": {
                    "reasons": {
                      "type": "array",
                      "description": "Reasons for consolidation",
                      "items": {
                        "type": "string",
                        "enum": ["Empty", "Underutilized", "Drifted"]
                      }
                    },
                    "nodes": {
                      "type": "string",
                      "description": "Percentage of nodes to consolidate",
                      "pattern": "^[0-9]+%$"
                    }
                  }
                }
              },
              "node_expiry": {
                "type": "string",
                "nullable": true,
                "description": "Node expiration time"
              },
              "pod_evictor": {
                "type": "object",
                "nullable": true,
                "description": "Configuration for pod eviction",
                "required": [
                  "enabled",
                  "evict_single_replicas",
                  "minimum_cpu",
                  "minimum_memory"
                ],
                "properties": {
                  "enabled": {
                    "type": "boolean",
                    "description": "Enable pod eviction"
                  },
                  "evict_single_replicas": {
                    "type": "boolean",
                    "description": "Allow eviction of single replica pods"
                  },
                  "minimum_cpu": {
                    "type": "integer",
                    "description": "Minimum CPU percentage threshold for eviction",
                    "minimum": 0,
                    "maximum": 100
                  },
                  "minimum_memory": {
                    "type": "integer",
                    "description": "Minimum memory percentage threshold for eviction",
                    "minimum": 0,
                    "maximum": 100
                  }
                }
              }
            }
          },
          "reverse_fallback": {
            "type": "object",
            "nullable": true,
            "description": "Configuration for reverse fallback strategy"
          }
        }
      }
    }
  }
