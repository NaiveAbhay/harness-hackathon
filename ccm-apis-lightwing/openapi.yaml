                  },
                  "pod_evictor": {
                    "$ref": "#/components/schemas/ClusterOrchestratorPodEvictor"
                  }
                }
              },
              "reverse_fallback": {
                "type": "string",
                "nullable": true,
                "example": "6h",
                "description": "The nodes which were replaced by a fallback ondemand node will be retried for spot after this window"
              }
            }
          }
        }
