              "spot_distribution": {
                "type": "string",
                "enum": [
                  "ALL",
                  "SpotReady",
                  "None"
                ]
              },
              "node_deletion_delay": {
                "type": "integer",
                "example": 0
              },
              "distribution_strategy": {
                "type": "string",
                "example": "CostOptimized",
                "enum": [
                  "CostOptimized",
                  "LeastInterrupted"
                ]
              },
              "base_on_demand_capacity": {
                "type": "integer",
                "example": 1
              },
              "spot_split": {
                "type": "integer",
                "example": 70
              },
              "on_demand_split": {
                "type": "integer",
                "example": 30
              },
              "consolidation": {
                "type": "object",
                "nullable": true,
                "properties": {
                  "policy": {
                    "type": "string",
                    "example": "WhenEmptyOrUnderutilized",
                    "enum": [
                      "WhenEmptyOrUnderutilized",
                      "WhenEmpty"
                    ]
                  },
                  "after": {
                    "type": "string",
                    "example": "1h5m",
                    "description": "Consolidation will be performed after this window"
                  },
                  "budgets": {
                    "type": "array",
                    "nullable": true,
                    "items": {
                      "$ref": "#/components/schemas/ClusterConsolidationBudget"
                    }
                  },
                  "node_expiry": {
                    "type": "string",
                    "nullable": true,
                    "example": "24h",
