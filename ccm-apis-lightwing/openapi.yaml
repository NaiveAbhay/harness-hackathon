  "paths": {
    "/accounts/{account_id}/autostopping/rules": {
      "get": {
        "tags": [
          "Cloud Cost AutoStopping Rules"
        ],
        "summary": "List AutoStopping Rules",
        "description": "Retrieves a list of all AutoStopping Rules configured in your account. AutoStopping Rules help optimize cloud costs by automatically stopping idle resources and starting them on-demand when accessed. ",
        "operationId": "ListAutoStoppingRules",
        "parameters": [
          {
            "name": "account_id",
            "description": "Unique identifier of the Harness account. This is used to scope the API request to a specific account.",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string"
            },
            "example": "abc12_DEFgh-ijkLMNOPqr"
          },
          {
            "name": "accountIdentifier",
            "description": "Account Identifier for authentication and authorization. ",
            "in": "query",
            "required": true,
            "schema": {
              "type": "string"
            },
            "example": "abc12_DEFgh-ijkLMNOPqr"
          },
          {
            "name": "dry_run",
            "description": "When set to true, filters the results to show only rules in dry-run mode. Dry-run rules monitor resource usage and calculate potential savings without actually stopping resources, allowing you to test rule configurations safely before enabling them.",
            "in": "query",
            "schema": {
              "type": "boolean",
              "default": false
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Successfully retrieved the list of AutoStopping Rules",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ServicesResponse"
                }
              }
            }
          },
          "400": {
            "description": "Invalid status value",
            "content": {}
          }
        }
      },
      "post": {
        "tags": [
          "Cloud Cost AutoStopping Rules"
        ],
        "summary": "Create an AutoStopping Rule",
        "description": "Creates a new AutoStopping Rule to automatically manage cloud resources and reduce costs. The rule monitors resource activity and automatically stops resources during idle periods, then restarts them when traffic is detected. You can configure idle time thresholds, access methods (HTTP/HTTPS, SSH, RDP), custom domains, and schedules.",
        "operationId": "UpdateAutoStoppingRule",
        "parameters": [
          {
            "name": "account_id",
            "description": "Account Identifier for the Entity",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string"
            },
            "example": "abc12_DEFgh-ijkLMNOPqr"
          },
          {
            "name": "accountIdentifier",
            "description": "Account Identifier for authentication and authorization.",
            "in": "query",
            "required": true,
            "schema": {
              "type": "string"
            },
            "example": "px7xd_BFRC"
          }
        ],
        "requestBody": {
          "description": "Complete service definition for the AutoStopping Rule including resource configuration, idle time settings, access control details, and optional schedules. The request body should specify the cloud resources to manage, the idle time threshold before stopping, and how users will access the resources.",
          "content": {
            "*/*": {
              "schema": {
                "$ref": "#/components/schemas/SaveServiceRequestWithoutDisabled"
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": "AutoStopping Rule created successfully",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ServiceResponseWithoutDisabled"
                }
              }
            }
          },
          "400": {
            "description": "Bad Request - Invalid rule configuration or missing required fields",
            "content": {
              "application/json": {
                "examples": {
                  "error": {
                    "summary": "Invalid configuration",
                    "value": {
                      "status": "ERROR",
                      "message": "Invalid resource configuration: missing required field 'resources'"
                    }
                  }
                }
              }
            }
          }
        },
        "x-codegen-request-body-name": "body"
      }
    },
