                    "minimum": 0,
                    "maximum": 100
                  },
                  "minimum_memory": {
                    "type": "integer",
                    "description": "Minimum memory percentage threshold for eviction",
                    "minimum": 0,
                    "maximum": 100
                  }
                }
              }
            }
          },
