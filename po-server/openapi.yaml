components:
  schemas:
    ApprovePipelineExecutionRequestBody:
      type: object
      properties:
        action:
          type: string
          enum:
            - APPROVE
            - REJECT
        approvalID:
          type: string
          description: ID of the approval
        message:
          type: string
          description: Message to send with the approval
      required:
        - approvalID
        - action
    Backend:
      type: object
      properties:
        steps:
          type: object
          properties:
            apply:
              type: object
              additionalProperties: true
            create:
              type: object
              additionalProperties: true
            delete:
              type: object
              additionalProperties: true
            destroy:
              type: object
              additionalProperties: true
            pause:
              type: object
              additionalProperties: true
            resume:
              type: object
              additionalProperties: true
          required:
            - apply
            - destroy
        type:
          type: string
        values:
          type: object
          additionalProperties: true
      required:
        - type
      additionalProperties: false
    CatalogEntity:
      type: object
      properties:
        backend:
          $ref: '#/components/schemas/Backend'
        identifier:
          type: string
        interface:
          $ref: '#/components/schemas/Interface'
      required:
        - identifier
      additionalProperties: false
    CompileError:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    CompileRequestBody:
      type: object
      properties:
        environmentYaml:
          type: string
          description: Environment to compile
        orgIdentifier:
          type: string
          description: Org is the organization identifier.
        projectIdentifier:
          type: string
          description: Project is the project identifier.
        targetState:
          $ref: '#/components/schemas/State'
      description: Scope for the request, including account, org and project.
      required:
        - environmentYaml
        - targetState
    CompileResponseBody:
      type: object
      properties:
        combinedOverrides:
          $ref: '#/components/schemas/EnvironmentOverrides'
        configOptions:
          $ref: '#/components/schemas/EnvironmentConfigOptions'
        errors:
