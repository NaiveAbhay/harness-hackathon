          type: string
        orgIdentifier:
          type: string
        owner:
          type: string
        projectIdentifier:
          type: string
        scope:
          type: string
        spec:
          $ref: '#/components/schemas/ComponentSpec'
        type:
          type: string
      required:
        - spec
        - apiVersion
        - identifier
        - name
        - kind
