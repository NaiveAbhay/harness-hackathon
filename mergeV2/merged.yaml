            type: string
            enum:
              - CD
              - CI
              - CV
              - CF
              - CE
              - STO
          in: query
          name: module
          description: Harness module which is part of the Pipeline.
        - schema:
            type: string
          in: query
          name: filter_identifier
          description: Identifier of a saved Filter.
        - schema:
            type: array
            items:
              type: string
          in: query
