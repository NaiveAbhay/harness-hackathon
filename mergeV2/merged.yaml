        - schema:
            type: string
            pattern: '^[a-zA-Z_][0-9a-zA-Z-_ ]{0,63}$'
            minLength: 1
            maxLength: 64
          in: query
          name: name
          description: Pipeline Name on the basis of which the Pipelines are filtered.
        - schema:
            type: string
            maxLength: 1024
          in: query
          name: description
          description: >-
            Pipeline Description on the basis of which the Pipelines are
            filtered.
        - schema:
            type: array
            items:
              type: string
            maxItems: 128
            example: 'key:value'
          examples:
            key_and_value:
              value: 'key:value'
              summary: Tag having both Key and Value.
            key_only:
              value: key
              summary: Tag having only Key.
          in: query
          name: tags
          description: 'Filter tags as a key:value pair.'
        - schema:
            type: array
            items:
              type: string
          in: query
          name: service_names
          description: Service names on the basis of which the Pipelines are filtered.
        - schema:
            type: array
            items:
              type: string
          in: query
          name: env_names
          description: >-
            Names of Environments on the basis of which the Pipelines are
            filtered.
        - schema:
            type: string
          in: query
          name: deployment_type
          description: Deployment type on the basis of which the Pipelines are filtered.
        - schema:
            type: string
          in: query
          name: repository
          description: Repository name on the basis of which the Pipelines are filtered.
      security:
        - x-api-key: []
      tags:
        - Pipelines
