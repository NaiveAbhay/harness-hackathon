      security:
        - x-api-key: []
    delete:
      summary: Delete a secret
      tags:
        - Project Secret
      operationId: delete-project-scoped-secret
      responses:
        '200':
          $ref: '#/components/responses/SecretResponse'
      description: Deletes the information of the secret with the matching secret slug.
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      security:
        - x-api-key: []
    put:
      summary: Update a secret
      operationId: update-project-scoped-secret
      responses:
        '200':
          $ref: '#/components/responses/SecretResponse'
      description: Updates the information of the secret with the matching secret slug.
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      requestBody:
        $ref: '#/components/requestBodies/SecretRequest'
      tags:
        - Project Secret
      security:
        - x-api-key: []
  /v1/connectors:
    post:
      summary: Create a Connector
      operationId: create-account-scoped-connector
      responses:
        '201':
          $ref: '#/components/responses/ConnectorResponse'
      description: Creates a new connector
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      security:
        - x-api-key: []
      requestBody:
        $ref: '#/components/requestBodies/ConnectorRequest'
      tags:
        - Account Connector
    get:
      summary: List connectors
      operationId: get-account-scoped-connectors
      responses:
        '200':
          $ref: '#/components/responses/ConnectorListResponse'
      description: Retrieves the information of the connectors.
      tags:
        - Account Connector
      parameters:
        - schema:
            type: boolean
            default: false
          in: query
          name: recursive
          description: 'Expand current scope to include all child scopes '
        - $ref: '#/components/parameters/SearchTerm'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/AccountHeader'
  '/v1/connectors/{connector}':
    get:
      summary: Retrieve a connector
      operationId: get-account-scoped-connector
      responses:
        '200':
          $ref: '#/components/responses/ConnectorResponse'
      description: >
        Retrieves the information of the connector with the matching connector
        slug.
      tags:
        - Account Connector
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
    put:
      summary: Update a connector
      operationId: update-account-scoped-connector
      responses:
        '200':
          $ref: '#/components/responses/ConnectorResponse'
      description: Updates the information of the secret with the matching secret slug.
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      requestBody:
        $ref: '#/components/requestBodies/ConnectorRequest'
      tags:
        - Account Connector
    parameters:
      - schema:
          type: string
        name: connector
        in: path
        required: true
        description: Connector slug
    delete:
      summary: Delete a connector
      operationId: delete-account-scoped-connector
      responses:
        '200':
          description: OK
      description: >-
        Deletes the information of the connector with the matching connector
        slug.
      tags:
        - Account Connector
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
  '/v1/connectors/{connector}/test-connection':
    get:
      summary: Test a connector
      operationId: test-account-scoped-connector
      responses:
        '200':
          $ref: '#/components/responses/ConnectorTestConnectionResponse'
      description: |
        Tests connection of the connector with the matching connector slug.
      tags:
        - Account Connector
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
    parameters:
      - schema:
          type: string
        name: connector
        in: path
        required: true
        description: Connector slug
  '/v1/orgs/{org}/connectors':
    post:
      summary: Create a Connector
      operationId: create-org-scoped-connector
      responses:
        '201':
          $ref: '#/components/responses/ConnectorResponse'
      description: Creates a new connector
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      security:
        - x-api-key: []
      requestBody:
        $ref: '#/components/requestBodies/ConnectorRequest'
      tags:
        - Org Connector
    parameters:
      - $ref: '#/components/parameters/OrgPathParam'
    get:
      summary: List connectors
      operationId: get-org-scoped-connectors
      responses:
        '200':
          $ref: '#/components/responses/ConnectorListResponse'
      description: Retrieves the information of the connectors.
      tags:
        - Org Connector
      parameters:
        - schema:
            type: boolean
            default: false
          in: query
          name: recursive
          description: 'Expand current scope to include all child scopes '
        - $ref: '#/components/parameters/SearchTerm'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/AccountHeader'
  '/v1/orgs/{org}/connectors/{connector}':
    get:
      summary: Retrieve a connector
      operationId: get-org-scoped-connector
      responses:
        '200':
          $ref: '#/components/responses/ConnectorResponse'
      description: >
        Retrieves the information of the connector with the matching connector
        slug.
      tags:
        - Org Connector
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
    put:
      summary: Update a connector
      operationId: update-org-scoped-connector
      responses:
        '200':
          $ref: '#/components/responses/ConnectorResponse'
      description: Updates the information of the secret with the matching secret slug.
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      requestBody:
        $ref: '#/components/requestBodies/ConnectorRequest'
      tags:
        - Org Connector
    delete:
      summary: Delete a connector
      operationId: delete-org-scoped-connector
      responses:
        '200':
          description: OK
      description: >-
        Deletes the information of the connector with the matching connector
        slug.
      tags:
        - Org Connector
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
    parameters:
      - $ref: '#/components/parameters/OrgPathParam'
      - schema:
          type: string
        name: connector
        in: path
        required: true
        description: Connector slug
  '/v1/orgs/{org}/connectors/{connector}/test-connection':
    get:
      summary: Test a connector
      operationId: test-org-scoped-connector
      responses:
        '200':
