components:
  schemas:
    Service:
      type: object
      x-examples:
        example-1:
          account: sample_account
          slug: example_service
          org: sample_organization
          project: sample_project
          name: Example_service
          description: This is a example service
          tags:
            example-tag-1: example-tag-1-value
            example-tag-2: example-tag-2-value
          yaml: |
            service:
              name: "Example_service"
              identifier: "example_service"
              tags: {}
      description: This is the Service entity defined in Harness
      title: Service
      properties:
        account:
          type: string
          description: Account Identifier
          pattern: '^[a-zA-Z_][0-9a-zA-Z_$]{0,63}$'
          minLength: 1
          maxLength: 64
        slug:
          type: string
          description: Identifier of the Service Request.
          pattern: '^[a-zA-Z_][0-9a-zA-Z_$]{0,63}$'
          minLength: 1
          maxLength: 64
        org:
          type: string
          description: Organization Identifier for the Entity.
          pattern: '^[a-zA-Z_][0-9a-zA-Z_$]{0,63}$'
          minLength: 1
          maxLength: 64
        project:
          type: string
          description: Project Identifier for the Entity.
          pattern: '^[a-zA-Z_][0-9a-zA-Z_$]{0,63}$'
          minLength: 1
          maxLength: 64
        name:
          type: string
          description: Name of the Service Request.
          pattern: '^[a-zA-Z_][0-9a-zA-Z_$]{0,63}$'
          minLength: 1
          maxLength: 64
        description:
          type: string
          description: Description of the entity
          maxLength: 1024
        tags:
          type: object
          additionalProperties:
            type: string
          description: Service tags
          maxProperties: 128
        yaml:
          type: string
          description: Yaml related to service
      required:
        - slug
        - name
    ServiceResponse:
      type: object
      x-examples:
        example-1:
          service:
            account: sample_account
            slug: example_service
            org: sample_organization
            project: sample_project
            name: Example_service
