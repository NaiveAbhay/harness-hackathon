openapi: 3.0.3
info:
  title: Harness NextGen Software Delivery Platform API Reference
  version: '1.0'
  description: >-
    This is the Open Api Spec 3 for the NextGen Manager. This is under active
    development. Beware of the breaking change with respect to the generated
    code stub
  contact:
    email: contact@harness.io
servers:
  - url: 'http://app.harness.io'
    description: Harness host url
security:
  - x-api-key: []
tags:
  - name: Organization
    description: Everything about organization
  - name: Org Project
    description: Everything about org scoped project
  - name: Account Secret
    description: Everything about account scoped secret
  - name: Org Secret
    description: Everything about org scoped secret
  - name: Project Secret
    description: Everything about project scoped secret
  - name: Project Services
    description: This contains APIs for performing CRUD operations on Services.
  - name: Account Connector
    description: Everything about account scoped connector
  - name: Org Connector
    description: Everything about org scoped connector
  - name: Project Connector
    description: Everything about project scoped connector
  - name: Pipelines
    description: This contains APIs for performing CRUD operations on Pipelines.
  - name: Account Template
    description: >-
      This contains APIs for performing CRUD operations on Templates at account
      scope.
  - name: Org Template
    description: >-
      This contains APIs for performing CRUD operations on Templates at org
      scope.
  - name: Project Template
    description: >-
      This contains APIs for performing CRUD operations on Templates at project
      scope.
paths:
  '/v1/orgs/{org}/projects/{project}/services/{service}':
    get:
      summary: Retrieve a Service
      operationId: get-service
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      description: 'Retrieves specified Service '
      security:
        - x-api-key: []
      responses:
        '200':
          $ref: '#/components/responses/ServiceResponse'
      tags:
        - Project Services
    parameters:
      - $ref: '#/components/parameters/OrgPathParam'
      - $ref: '#/components/parameters/ProjectPathParam'
      - $ref: '#/components/parameters/ServicePathParam'
    put:
      summary: Update Service
      operationId: update-service
      responses:
        '200':
          $ref: '#/components/responses/ServiceResponse'
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      requestBody:
        $ref: '#/components/requestBodies/ServiceRequest'
      description: Update Services
      security:
        - x-api-key: []
      tags:
        - Project Services
    delete:
      summary: Delete a Service
      operationId: delete-service
      responses:
        '200':
          $ref: '#/components/responses/ServiceResponse'
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      description: Deletes the requested service
      security:
        - x-api-key: []
      tags:
        - Project Services
  '/v1/orgs/{org}/projects/{project}/services':
    get:
      summary: List Services
      responses:
        '200':
          $ref: '#/components/responses/ServiceListResponse'
      operationId: get-services
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/SearchTerm'
        - $ref: '#/components/parameters/ServiceIdentifiers'
        - $ref: '#/components/parameters/Sort'
        - schema:
            type: boolean
          in: query
          name: is_access_list
          description: >-
            Specify whether list an access list or not. Access List refers to
            list of services that current user has permission to use in the
            pipeline.
        - schema:
            type: string
            enum:
              - Kubernetes
              - NativeHelm
              - Ssh
              - WinRm
              - ServerlessAwsLambda
              - AzureWebApp
          name: type
          in: query
          description: Service Definition type
        - schema:
            type: boolean
          name: git_ops_enabled
          in: query
          description: Enables use of this service in Harness GitOps PR Pipelines
        - $ref: '#/components/parameters/AccountHeader'
        - $ref: '#/components/parameters/Order'
      security:
        - x-api-key: []
      description: >-
        Returns all services that the current user has view permissions for
        given project.
      tags:
        - Project Services
    post:
      summary: Create a Service
      operationId: create-service
      responses:
        '201':
          $ref: '#/components/responses/ServiceResponse'
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      requestBody:
        $ref: '#/components/requestBodies/ServiceRequest'
      description: Creates a Service
      security:
        - x-api-key: []
      tags:
        - Project Services
    parameters:
      - $ref: '#/components/parameters/OrgPathParam'
      - $ref: '#/components/parameters/ProjectPathParam'
  /v1/orgs:
    post:
      summary: Create an organization
      operationId: create-organization
      responses:
        '201':
          $ref: '#/components/responses/OrganizationResponse'
      description: Creates a new organization.
      security:
        - x-api-key: []
      tags:
        - Organization
      requestBody:
        $ref: '#/components/requestBodies/CreateOrganizationRequest'
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
    get:
      summary: List organizations
      operationId: get-organizations
      responses:
        '200':
          $ref: '#/components/responses/OrganizationListResponse'
      description: Retrieves the information of the organizations.
      security:
        - x-api-key: []
      tags:
        - Organization
      parameters:
        - $ref: '#/components/parameters/OrgsQueryParam'
        - $ref: '#/components/parameters/SearchTerm'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/AccountHeader'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
    parameters: []
  '/v1/orgs/{org}':
    parameters:
      - schema:
          type: string
        name: org
        in: path
        required: true
        description: Organization slug
    get:
      summary: Retrieve an organization
      responses:
        '200':
          $ref: '#/components/responses/OrganizationResponse'
      operationId: get-organization
      description: >-
        Retrieves the information of the organization with the matching
        organization slug.
      security:
        - x-api-key: []
      tags:
        - Organization
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
    put:
      summary: Update an organization
      operationId: update-organization
      responses:
        '200':
          $ref: '#/components/responses/OrganizationResponse'
      description: >-
        Updates the information of the organization with the matching
        organization slug.
      security:
        - x-api-key: []
      tags:
        - Organization
      requestBody:
        $ref: '#/components/requestBodies/UpdateOrganizationRequest'
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
    delete:
      summary: Delete an organization
      operationId: delete-organization
      responses:
        '200':
          $ref: '#/components/responses/OrganizationResponse'
      description: >-
        Deletes the information of the organization with the matching
        organization slug.
      security:
        - x-api-key: []
      tags:
        - Organization
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
  '/v1/orgs/{org}/projects':
    post:
      summary: Creates a project
      responses:
        '201':
          $ref: '#/components/responses/ProjectResponse'
      operationId: create-org-scoped-project
      security:
        - x-api-key: []
      description: Creates a new project
      requestBody:
        $ref: '#/components/requestBodies/CreateProjectRequest'
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      tags:
        - Org Project
    get:
      summary: List projects
      responses:
        '200':
          $ref: '#/components/responses/ProjectListResponse'
      operationId: get-org-scoped-projects
      description: Retrieves the information of the projects.
      security:
        - x-api-key: []
      parameters:
        - $ref: '#/components/parameters/ProjectsQueryParam'
        - schema:
            type: boolean
            default: true
          in: query
          name: has_module
          description: >-
            This boolean specifies whether to filter projects which has the
            module of type passed in the moduleType parameter or not
        - schema:
            type: string
          in: query
          name: module_type
          description: Project's module type
        - $ref: '#/components/parameters/SearchTerm'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/AccountHeader'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
      tags:
        - Org Project
    parameters:
      - $ref: '#/components/parameters/OrgPathParam'
  '/v1/orgs/{org}/projects/{project}':
    get:
      summary: Retrieve a project
      responses:
        '200':
          $ref: '#/components/responses/ProjectResponse'
      operationId: get-org-scoped-project
      description: Retrieves the information of the project with the matching project slug.
      security:
        - x-api-key: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      tags:
        - Org Project
    put:
      summary: Update a project
      responses:
        '200':
          $ref: '#/components/responses/ProjectResponse'
      operationId: update-org-scoped-project
      description: Updates the information of the project with the matching project slug.
      security:
        - x-api-key: []
      requestBody:
        $ref: '#/components/requestBodies/UpdateProjectRequest'
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      tags:
        - Org Project
    delete:
      summary: Delete a project
      responses:
        '200':
          $ref: '#/components/responses/ProjectResponse'
      operationId: delete-org-scoped-project
      description: Deletes the information of the project with the matching project slug.
      security:
        - x-api-key: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      tags:
        - Org Project
    parameters:
      - $ref: '#/components/parameters/OrgPathParam'
      - $ref: '#/components/parameters/ProjectPathParam'
  /v1/secrets:
    post:
      summary: Create a secret
      operationId: create-account-scoped-secret
      responses:
        '201':
          $ref: '#/components/responses/SecretResponse'
      description: Creates a new secret
      parameters:
        - $ref: '#/components/parameters/PrivateSecret'
        - $ref: '#/components/parameters/AccountHeader'
      security:
        - x-api-key: []
      requestBody:
        $ref: '#/components/requestBodies/SecretRequest'
      tags:
        - Account Secret
    get:
      summary: List secrets
      operationId: get-account-scoped-secrets
      responses:
        '200':
          $ref: '#/components/responses/SecretListResponse'
      description: Retrieves the information of the secrets.
      parameters:
        - schema:
            type: array
            items:
              type: string
          in: query
          name: secret
          description: Slug field of secrets
        - schema:
            type: array
            items:
              type: string
              enum:
                - SSHKeyPath
                - SSHKeyReference
                - SSHPassword
                - SSHKerberosTGTKeyTabFile
                - SSHKerberosTGTPassword
                - SecretFile
                - SecretText
                - WinRmTGTKeyTabFile
                - WinRmTGTPassword
                - WinRmNTLM
          in: query
          name: type
          description: Secret types on which the filter will be applied
        - schema:
            type: boolean
            default: false
          in: query
          name: recursive
          description: 'Expand current scope to include all child scopes '
        - $ref: '#/components/parameters/SearchTerm'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/AccountHeader'
      tags:
        - Account Secret
      security:
        - x-api-key: []
  '/v1/orgs/{org}/secrets':
    parameters:
      - $ref: '#/components/parameters/OrgPathParam'
    post:
      summary: Create a secret
      operationId: create-org-scoped-secret
      responses:
