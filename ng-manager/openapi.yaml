openapi: 3.0.3
info:
  title: Harness NextGen Software Delivery Platform API Reference
  version: '1.0'
  description: >-
    This is the Open Api Spec 3 for NextGen Manager. This is under active
    development. Beware of the breaking change with respect to the generated
    code stub
  contact:
    email: contact@harness.io
servers:
  - url: 'https://app.harness.io'
    description: Harness host URL.
tags:
  - name: Organization
    description: >-
      Create and manage organizations in your account. You use organizations to
      group together related projects. For example, you can use an organization
      to group together projects within a business unit or division.
  - name: Org Project
    description: This contains APIs for projects.
    x-displayName: 'Project [Beta]'
  - name: Account Secret
    description: This contains APIs for account-scoped secrets.
    x-displayName: 'Account Secrets [Beta]'
  - name: Org Secret
    description: This contains APIs for organization-scoped secrets.
    x-displayName: 'Organization Secrets [Beta]'
  - name: Project Secret
    description: This contains APIs for project-scoped secrets.
    x-displayName: 'Project Secrets [Beta]'
  - name: Account Services
    description: This contains APIs for account-scoped services.
    x-displayName: 'Account Services [Beta]'
  - name: Org Services
    description: This contains APIs for organization-scoped services.
    x-displayName: 'Organization Services [Beta]'
  - name: Project Services
    description: This contains APIs for project-scoped services.
    x-displayName: 'Project Services [Beta]'
  - name: Project Environments
    description: This contains APIs for project-scoped environments.
    x-displayName: 'Project Environments [Beta]'
  - name: Account Favorites
    description: This contains APIs for account-scoped Favorites.
    x-displayName: 'Account Favorites [Beta]'
  - name: Org Favorites
    description: This contains APIs for organization-scoped Favorites.
    x-displayName: 'Organization Favorites [Beta]'
  - name: Project Favorites
    description: This contains APIs for project-scoped Favorites.
    x-displayName: 'Project Favorites [Beta]'
  - name: Account Rancher Infrastructure
    description: This contains APIs for Rancher infra entities for account level.
    x-displayName: 'Account Rancher Infrastructure [Beta]'
  - name: Org Rancher Infrastructure
    description: This contains APIs for Rancher infra entities for org level.
    x-displayName: 'Org Rancher Infrastructure [Beta]'
  - name: Project Rancher Infrastructure
    description: This contains APIs for Rancher infra entities for project level.
    x-displayName: 'Project Rancher Infrastructure [Beta]'
  - name: K8s Release Service Mapping
    description: This contains APIs for Fetching Release details regarding a pod.
    x-displayName: 'K8s Release Service Mapping [Beta]'
  - name: EULA
    description: This contains APIs for EULA.
    x-displayName: 'EULA [Beta]'
  - name: Account Certificate
    description: This contains APIs for account-scoped Certificates
    x-displayName: 'Account Certificates [Beta]'
  - name: Org Certificate
    description: This contains APIs for organization-scoped Certificates
    x-displayName: 'Org Certificates [Beta]'
  - name: Project Certificate
    description: This contains APIs for project-scoped Certificates
    x-displayName: 'Project Certificates [Beta]'
  - name: IP Allowlist
    description: This contains APIs for IP Allowlist.
    x-displayName: 'IP Allowlist [Beta]'
  - name: GitX Webhooks
    description: This contains APIs for Account GitX Webhooks.
    x-displayName: Account GitX Webhooks
  - name: Org GitX Webhooks
    description: This contains APIs for Org GitX Webhooks.
    x-displayName: Org GitX Webhooks
  - name: Project GitX Webhooks
    description: This contains APIs for Project GitX Webhooks.
    x-displayName: Project GitX Webhooks
  - name: Gitx Webhooks Events
    description: This contains APIs for Account Gitx Webhooks Events.
    x-displayName: Account Gitx Webhooks Events
  - name: Org Gitx Webhooks Events
    description: This contains APIs for Org Gitx Webhooks Events.
    x-displayName: Org Gitx Webhooks Events
  - name: Project Gitx Webhooks Events
    description: This contains APIs for Project Gitx Webhooks Events.
    x-displayName: Project Gitx Webhooks Events
  - name: Account Webhooks
    description: This contains APIs for Account Webhooks.
    x-displayName: Account Webhooks
  - name: Org Webhooks
    description: This contains APIs for Org Webhooks.
    x-displayName: Org Webhooks
  - name: Project Webhooks
    description: This contains APIs for Project Webhooks.
    x-displayName: Project Webhooks
  - name: Account Banner
    description: This contains APIs for Account Banners.
    x-displayName: Account Banner
  - name: Account Licensed Modules
    description: This contains APIs for Account Licensed Modules.
    x-displayName: Account Licensed Modules
paths:
  '/v1/orgs/{org}/projects/{project}/services/{service}':
    get:
      summary: Retrieve a service
      operationId: get-service
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      description: Retrieves the specified service
      security:
        - x-api-key: []
      responses:
        '200':
          $ref: '#/components/responses/ServiceResponse'
      tags:
        - Project Services
    parameters:
      - $ref: '#/components/parameters/OrgPathParam'
      - $ref: '#/components/parameters/ProjectPathParam'
      - $ref: '#/components/parameters/ServicePathParam'
    put:
      summary: Update Service
      operationId: update-service
      responses:
        '200':
          $ref: '#/components/responses/ServiceResponse'
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      requestBody:
        $ref: '#/components/requestBodies/ServiceUpdateRequest'
      description: Updates the specified service
      security:
        - x-api-key: []
      tags:
        - Project Services
    delete:
      summary: Delete a Service
      operationId: delete-service
      responses:
        '200':
          $ref: '#/components/responses/ServiceResponse'
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
        - $ref: '#/components/parameters/ForceDelete'
      description: Deletes the requested service.
      security:
        - x-api-key: []
      tags:
        - Project Services
  '/v1/orgs/{org}/projects/{project}/services':
    get:
      summary: List Services
      responses:
        '200':
          $ref: '#/components/responses/ServiceListResponse'
      operationId: get-services
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/SearchTerm'
        - $ref: '#/components/parameters/ServiceIdentifiers'
        - $ref: '#/components/parameters/Sort'
        - schema:
            type: boolean
          in: query
          name: is_access_list
          description: >-
            Specifies whether the list is an access list. An access list is a
            list of services that you are permitted to use in a pipeline.
        - $ref: '#/components/parameters/DeploymentType'
        - schema:
            type: boolean
          name: git_ops_enabled
          in: query
          description: Enables you to use the service in Harness GitOps PR pipelines.
        - $ref: '#/components/parameters/AccountHeader'
        - $ref: '#/components/parameters/Order'
      security:
        - x-api-key: []
      description: >-
        Returns a list of the services for which you have view permissions in
        the given project.
      tags:
        - Project Services
    post:
      summary: Create a Service
      operationId: create-service
      responses:
        '201':
          $ref: '#/components/responses/ServiceResponse'
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      requestBody:
        $ref: '#/components/requestBodies/ServiceCreateRequest'
      description: Creates a service
      security:
        - x-api-key: []
      tags:
        - Project Services
    parameters:
      - $ref: '#/components/parameters/OrgPathParam'
      - $ref: '#/components/parameters/ProjectPathParam'
  '/v1/orgs/{org}/services/{service}':
    get:
      summary: Retrieve a service
      operationId: get-org-scoped-service
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      description: Retrieves the specified service
      security:
        - x-api-key: []
      responses:
        '200':
          $ref: '#/components/responses/ServiceResponse'
      tags:
        - Org Services
    parameters:
      - $ref: '#/components/parameters/OrgPathParam'
      - $ref: '#/components/parameters/ServicePathParam'
    put:
      summary: Update Service
      operationId: update-org-scoped-service
      responses:
        '200':
          $ref: '#/components/responses/ServiceResponse'
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      requestBody:
        $ref: '#/components/requestBodies/ServiceUpdateRequest'
      description: Updates the specified service
      security:
        - x-api-key: []
      tags:
        - Org Services
    delete:
      summary: Delete a service
      operationId: delete-org-scoped-service
      responses:
        '200':
          $ref: '#/components/responses/ServiceResponse'
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
        - $ref: '#/components/parameters/ForceDelete'
      description: Deletes the requested service
      security:
        - x-api-key: []
      tags:
        - Org Services
  '/v1/orgs/{org}/services':
    get:
      summary: List Services
      responses:
        '200':
          $ref: '#/components/responses/ServiceListResponse'
      operationId: get-org-scoped-services
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/SearchTerm'
        - $ref: '#/components/parameters/ServiceIdentifiers'
        - $ref: '#/components/parameters/Sort'
        - schema:
            type: boolean
          in: query
          name: is_access_list
          description: >-
            Specifies whether the list is an access list. An access list is a
            list of services that you are permitted to use in a pipeline.
        - $ref: '#/components/parameters/DeploymentType'
        - schema:
            type: boolean
          name: git_ops_enabled
          in: query
          description: Enables you to use the service in Harness GitOps PR pipelines.
        - $ref: '#/components/parameters/AccountHeader'
        - $ref: '#/components/parameters/Order'
      security:
        - x-api-key: []
      description: >-
        Returns a list of the services for which you have view permissions in
        the given project.
      tags:
        - Org Services
    post:
      summary: Create a service
      operationId: create-org-scoped-service
      responses:
        '201':
          $ref: '#/components/responses/ServiceResponse'
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      requestBody:
        $ref: '#/components/requestBodies/ServiceCreateRequest'
      description: Creates a service
      security:
        - x-api-key: []
      tags:
        - Org Services
    parameters:
      - $ref: '#/components/parameters/OrgPathParam'
  '/v1/services/{service}':
    get:
      summary: Retrieve a service
      operationId: get-account-scoped-service
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      description: Retrieves the specified service
      security:
        - x-api-key: []
      responses:
        '200':
          $ref: '#/components/responses/ServiceResponse'
      tags:
        - Account Services
    parameters:
      - $ref: '#/components/parameters/ServicePathParam'
    put:
      summary: Update service
      operationId: update-account-scoped-service
      responses:
        '200':
          $ref: '#/components/responses/ServiceResponse'
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      requestBody:
        $ref: '#/components/requestBodies/ServiceUpdateRequest'
      description: Updates the specified service
      security:
        - x-api-key: []
      tags:
        - Account Services
    delete:
      summary: Delete a service
      operationId: delete-account-scoped-service
      responses:
        '200':
          $ref: '#/components/responses/ServiceResponse'
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
        - $ref: '#/components/parameters/ForceDelete'
      description: Deletes the requested service
      security:
        - x-api-key: []
      tags:
        - Account Services
  /v1/services:
    get:
      summary: List services
      responses:
        '200':
          $ref: '#/components/responses/ServiceListResponse'
      operationId: get-account-scoped-services
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/SearchTerm'
        - $ref: '#/components/parameters/ServiceIdentifiers'
        - $ref: '#/components/parameters/Sort'
        - schema:
            type: boolean
          in: query
          name: is_access_list
          description: >-
            Specifies whether the list is an access list. An access list is a
            list of services that you are permitted to use in a pipeline.
        - $ref: '#/components/parameters/DeploymentType'
        - schema:
            type: boolean
          name: git_ops_enabled
          in: query
          description: Enables you to use the service in Harness GitOps PR pipelines.
        - $ref: '#/components/parameters/AccountHeader'
        - $ref: '#/components/parameters/Order'
      security:
        - x-api-key: []
      description: >-
        Returns a list of the services for which you have view permissions in
        the given project.
      tags:
        - Account Services
    post:
      summary: Create a service
      operationId: create-account-scoped-service
      responses:
        '201':
          $ref: '#/components/responses/ServiceResponse'
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      requestBody:
        $ref: '#/components/requestBodies/ServiceCreateRequest'
      description: Creates a service
      security:
        - x-api-key: []
      tags:
        - Account Services
    parameters: []
  '/v1/creditOverUsage/{accountIdentifier}':
    get:
      summary: Get over usage count of Credits for a given account
      tags:
        - Credits OverUsage Data By Account
      responses:
        '200':
          $ref: '#/components/schemas/CreditOverUsage'
        '400':
          headers: {}
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties: {}
      operationId: credits-overusage
      x-internal: false
      security:
        - bearerAuth: []
      parameters:
        - name: accountIdentifier
          in: path
          required: true
          description: Account Identifier for the Entity.
          schema:
            type: string
  '/v1/subscription/{accountIdentifier}':
    get:
      summary: Retrieve type of licenses for an account
      tags:
        - Account License Type
      operationId: get-license-type
      responses:
        '200':
          $ref: '#/components/schemas/LicenseTypeResponse'
        '400':
          headers: {}
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties: {}
      x-internal: false
      security:
        - bearerAuth: []
      parameters:
        - name: accountIdentifier
          in: path
          required: true
          description: Account Identifier for the Entity.
          schema:
            type: string
  '/v1/subscription/devops/{accountIdentifier}':
    get:
      summary: >-
        Get subscriptions information for the Devops Essentials package for an
        accountIdentifier.
      tags:
        - Devops Essentials License Data By Account
      responses:
        '200':
          $ref: '#/components/schemas/DevopsEssentialsResponse'
        '400':
          headers: {}
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties: {}
        x-internal: false
      operationId: get-devops-essentials-license
      security:
        - bearerAuth: []
      parameters:
        - name: accountIdentifier
          in: path
          required: true
          description: Account Identifier for the Entity.
          schema:
            type: string
  /v1/orgs:
    post:
      summary: 'Create an organization [Beta]'
      operationId: create-organization
      responses:
        '201':
          $ref: '#/components/responses/OrganizationResponse'
      description: Creates a new organization.
      security:
        - x-api-key: []
      tags:
        - Organization
      requestBody:
        $ref: '#/components/requestBodies/CreateOrganizationRequest'
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
    get:
      summary: 'List organizations [Beta]'
      operationId: get-organizations
      responses:
        '200':
          $ref: '#/components/responses/OrganizationListResponse'
      description: Retrieves the information of the organizations.
      security:
        - x-api-key: []
      tags:
        - Organization
      parameters:
        - $ref: '#/components/parameters/OrgsQueryParam'
        - $ref: '#/components/parameters/SearchTerm'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/AccountHeader'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
    parameters: []
  '/v1/orgs/{org}':
    parameters:
      - schema:
          type: string
        name: org
        in: path
        required: true
        description: Organization identifier
    get:
      summary: 'Retrieve an organization [Beta]'
      responses:
        '200':
          $ref: '#/components/responses/OrganizationResponse'
      operationId: get-organization
      description: >-
        Retrieves the information of the organization with the matching
        organization identifier.
      security:
        - x-api-key: []
      tags:
        - Organization
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
    put:
      summary: 'Update an organization [Beta]'
      operationId: update-organization
      responses:
        '200':
          $ref: '#/components/responses/OrganizationResponse'
      description: >-
        Updates the information of the organization with the matching
        organization identifier.
      security:
        - x-api-key: []
      tags:
        - Organization
      requestBody:
        $ref: '#/components/requestBodies/UpdateOrganizationRequest'
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
    delete:
      summary: 'Delete an organization [Beta]'
      operationId: delete-organization
      responses:
        '200':
          $ref: '#/components/responses/OrganizationResponse'
      description: >-
        Deletes the information of the organization with the matching
        organization identifier.
      security:
        - x-api-key: []
      tags:
        - Organization
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
  '/v1/orgs/{org}/projects':
    post:
      summary: Create a project
      responses:
        '201':
          $ref: '#/components/responses/ProjectResponse'
      operationId: create-org-scoped-project
      security:
        - x-api-key: []
      description: Creates a new project
      requestBody:
        $ref: '#/components/requestBodies/CreateProjectRequest'
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      tags:
        - Org Project
    get:
      summary: List projects
      responses:
        '200':
          $ref: '#/components/responses/ProjectListResponse'
      operationId: get-org-scoped-projects
      description: Retrieves the information of the projects.
      security:
        - x-api-key: []
      parameters:
        - $ref: '#/components/parameters/ProjectsQueryParam'
        - schema:
            type: boolean
            default: true
          in: query
          name: has_module
          description: >-
            This boolean specifies whether to filter projects which has the
            module of type passed in the moduleType parameter or not
        - schema:
            type: string
          in: query
          name: module_type
          description: Project's module type
        - $ref: '#/components/parameters/onlyFavorites'
        - $ref: '#/components/parameters/SearchTerm'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/AccountHeader'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
      tags:
        - Org Project
    parameters:
      - $ref: '#/components/parameters/OrgPathParam'
  '/v1/orgs/{org}/projects/{project}':
    get:
      summary: Retrieve a project
      responses:
        '200':
          $ref: '#/components/responses/ProjectResponse'
      operationId: get-org-scoped-project
      description: >-
        Retrieves the information of the project with the matching project
        identifier.
      security:
        - x-api-key: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      tags:
        - Org Project
    put:
      summary: Update a project
      responses:
        '200':
          $ref: '#/components/responses/ProjectResponse'
      operationId: update-org-scoped-project
      description: >-
        Updates the information of the project with the matching project
        identifier.
      security:
        - x-api-key: []
      requestBody:
        $ref: '#/components/requestBodies/UpdateProjectRequest'
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      tags:
        - Org Project
    delete:
      summary: Delete a project
      responses:
        '200':
          $ref: '#/components/responses/ProjectResponse'
      operationId: delete-org-scoped-project
      description: >-
        Deletes the information of the project with the matching project
        identifier.
      security:
        - x-api-key: []
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      tags:
        - Org Project
    parameters:
      - $ref: '#/components/parameters/OrgPathParam'
      - $ref: '#/components/parameters/ProjectPathParam'
  /v1/ip-allowlist:
    post:
      summary: Create a IP Allowlist config
      operationId: create-ip-allowlist-config
      responses:
        '201':
          $ref: '#/components/responses/IPAllowlistConfigResponse'
      description: Creates a new IP Allowlist config
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      security:
        - x-api-key: []
      requestBody:
        $ref: '#/components/requestBodies/IPAllowlistConfigRequest'
      tags:
        - IP Allowlist
      x-internal: false
    get:
      summary: List IP Allowlist Configs
      operationId: get-ip-allowlist-configs
      responses:
        '200':
          $ref: '#/components/responses/IPAllowlistConfigListResponse'
      description: Retrieves the information of the IP Allowlist Config
      parameters:
        - $ref: '#/components/parameters/SearchTerm'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/AccountHeader'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
        - schema:
            type: string
          in: query
          description: This is to filter IP allowlist configs only blocked from UI or API
          name: allowed_source_type
      security:
        - x-api-key: []
      tags:
        - IP Allowlist
      x-internal: false
    parameters: []
  '/v1/ip-allowlist/{ip-config-identifier}':
    get:
      summary: Retrieve a IP Allowlist config
      operationId: get-ip-allowlist-config
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      description: Retrieves the specified IP Allowlist config
      security:
        - x-api-key: []
      responses:
        '200':
          $ref: '#/components/responses/IPAllowlistConfigResponse'
      tags:
        - IP Allowlist
      x-internal: false
    parameters:
      - schema:
          type: string
        name: ip-config-identifier
        in: path
        required: true
    put:
      summary: Update IP Allowlist config
      operationId: update-ip-allowlist-config
      responses:
        '200':
          $ref: '#/components/responses/IPAllowlistConfigResponse'
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      requestBody:
        $ref: '#/components/requestBodies/IPAllowlistConfigRequest'
      description: Updates the specified IP Allowlist config
      security:
        - x-api-key: []
      tags:
        - IP Allowlist
      x-internal: false
    delete:
      summary: Delete an IP Allowlist config
      operationId: delete-ip-allowlist-config
      responses:
        '204':
          description: No Content
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      description: Deletes the specified IP Allowlist config
      security:
        - x-api-key: []
      tags:
        - IP Allowlist
      x-internal: false
  '/v1/ip-allowlist/validate-unique-identifier/{ip-config-identifier}':
    get:
      summary: Validate unique IP Allowlist config identifier
      operationId: validate-unique-ip-allowlist-config-identifier
      description: Checks whether the IP Allowlist config identifier is unique or not
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
      security:
        - x-api-key: []
      tags:
        - IP Allowlist
      x-internal: false
      responses:
        '200':
          $ref: '#/components/responses/IPAllowlistValidateUniqueIdentifierResponse'
    parameters:
      - schema:
          type: string
        name: ip-config-identifier
        in: path
        required: true
  /v1/ip-allowlist/validate/ip-address:
    get:
      summary: Validate IP address lies in a specified range or not
      operationId: validate-ip-address-allowlisted-or-not
      responses:
        '200':
          $ref: '#/components/responses/IPAllowlistConfigValidateResponse'
      description: >-
        Checks whether the IP address is allowed or not. It also supports
        checking against a specific IP block range.
      parameters:
        - $ref: '#/components/parameters/AccountHeader'
        - schema:
            type: string
          in: query
          name: ip_address
          description: This is the IP address that needs to be checked if allowed or not
          required: true
        - schema:
            type: string
          in: query
          name: custom_ip_address_block
          description: >-
            This is the IP address or block of IP address against which we need
            to verify if a given IP address is allowed or not. If not passed we
