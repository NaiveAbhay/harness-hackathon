openapi: 3.0.3
info:
  title: Harness NextGen Software Delivery Platform API Reference
  version: '1.0'
  description: This is the Open Api Spec 3 for the NextGen Manager. This is under active development. Beware of the breaking change with respect to the generated code stub
  contact:
    email: contact@harness.io
servers:
  - url: 'http://app.harness.io'
    description: harness
x-tagGroups:
  - name: Organization
    tags:
      - Organization
  - name: Project
    tags:
      - Account Project
      - Org Project
  - name: Secret
    tags:
      - Account Secret
      - Org Secret
      - Project Secret
  - name: Connector
    tags:
      - Account Connector
      - Org Connector
      - Project Connector
tags:
  - name: Organization
    description: Everything about organization
  - name: Account Project
    description: Everything about account scoped project
  - name: Org Project
    description: Everything about org scoped project
  - name: Account Secret
    description: Everything about account scoped secret
  - name: Org Secret
    description: Everything about org scoped secret
  - name: Project Secret
    description: Everything about project scoped secret
  - name: Account Connector
    description: Everything about account scoped connector
  - name: Org Connector
    description: Everything about org scoped connector
  - name: Project Connector
    description: Everything about project scoped connector
paths:
  /v1/orgs:
    post:
      summary: Create an organization
      operationId: create-organization
      responses:
        '201':
          $ref: '#/components/responses/OrganizationResponse'
      description: Creates a new organization.
      security:
        - x-api-key: []
      tags:
        - Organization
      requestBody:
        $ref: '#/components/requestBodies/CreateOrganizationRequest'
      parameters:
        - $ref: '#/components/parameters/AccountQueryParam'
    get:
      summary: List organizations
      operationId: get-organizations
      responses:
        '200':
          $ref: '#/components/responses/OrganizationListResponse'
      description: Retrieves the information of the organizations.
      security:
        - x-api-key: []
      tags:
        - Organization
      parameters:
        - $ref: '#/components/parameters/AccountQueryParam'
        - $ref: '#/components/parameters/OrgsQueryParam'
        - $ref: '#/components/parameters/SearchTerm'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
    parameters: []
  '/v1/orgs/{org}':
    parameters:
      - schema:
          type: string
        name: org
        in: path
        required: true
        description: Organization slug
    get:
      summary: Retrieve an organization
      responses:
        '200':
          $ref: '#/components/responses/OrganizationResponse'
      operationId: get-organization
      description: Retrieves the information of the organization with the matching organization slug.
      security:
        - x-api-key: []
      tags:
        - Organization
      parameters:
        - $ref: '#/components/parameters/AccountQueryParam'
    put:
      summary: Update an organization
      operationId: update-organization
      responses:
        '200':
          $ref: '#/components/responses/OrganizationResponse'
      description: Updates the information of the organization with the matching organization slug.
      security:
        - x-api-key: []
      tags:
        - Organization
      requestBody:
        $ref: '#/components/requestBodies/UpdateOrganizationRequest'
      parameters:
        - $ref: '#/components/parameters/AccountQueryParam'
    delete:
      summary: Delete an organization
      operationId: delete-organization
      responses:
        '200':
          $ref: '#/components/responses/OrganizationResponse'
      description: Deletes the information of the organization with the matching organization slug.
      security:
        - x-api-key: []
      tags:
        - Organization
      parameters:
        - $ref: '#/components/parameters/AccountQueryParam'
  /v1/projects:
    post:
      summary: Create a project
      responses:
        '201':
          $ref: '#/components/responses/ProjectResponse'
      operationId: create-account-scoped-project
      security:
        - x-api-key: []
      description: Creates a new project
      requestBody:
        $ref: '#/components/requestBodies/CreateProjectRequest'
      parameters:
        - $ref: '#/components/parameters/AccountQueryParam'
      tags:
        - Account Project
    get:
      summary: List projects
      responses:
        '200':
          $ref: '#/components/responses/ProjectListResponse'
      operationId: get-account-scoped-projects
      description: Retrieves the information of the projects.
      security:
        - x-api-key: []
      parameters:
        - $ref: '#/components/parameters/AccountQueryParam'
        - $ref: '#/components/parameters/OrgsQueryParam'
        - $ref: '#/components/parameters/ProjectsQueryParam'
        - schema:
            type: boolean
            default: true
          in: query
          name: has_module
          description: This boolean specifies whether to filter projects which has the module of type passed in the moduleType parameter or not
        - schema:
            type: string
          in: query
          name: module_type
          description: Project's module type
        - $ref: '#/components/parameters/SearchTerm'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      tags:
        - Account Project
    parameters: []
  '/v1/orgs/{org}/projects':
    post:
      summary: Creates a project
      responses:
        '201':
          $ref: '#/components/responses/ProjectResponse'
      operationId: create-org-scoped-project
      security:
        - x-api-key: []
      description: Creates a new project
      requestBody:
        $ref: '#/components/requestBodies/CreateProjectRequest'
      parameters:
        - $ref: '#/components/parameters/AccountQueryParam'
      tags:
        - Org Project
    get:
      summary: List projects
      responses:
        '200':
          $ref: '#/components/responses/ProjectListResponse'
      operationId: get-org-scoped-projects
      description: Retrieves the information of the projects.
      security:
        - x-api-key: []
      parameters:
        - $ref: '#/components/parameters/AccountQueryParam'
        - $ref: '#/components/parameters/ProjectsQueryParam'
        - schema:
            type: boolean
            default: true
          in: query
          name: has_module
          description: This boolean specifies whether to filter projects which has the module of type passed in the moduleType parameter or not
        - schema:
            type: string
          in: query
          name: module_type
          description: Project's module type
        - $ref: '#/components/parameters/SearchTerm'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      tags:
        - Org Project
    parameters:
      - $ref: '#/components/parameters/OrgPathParam'
  '/v1/projects/{project}':
    get:
      summary: Retrieve a project
      responses:
        '200':
          $ref: '#/components/responses/ProjectResponse'
      operationId: get-account-scoped-project
      description: Retrieves the information of the project with the matching project slug.
      security:
        - x-api-key: []
      parameters:
        - $ref: '#/components/parameters/AccountQueryParam'
      tags:
        - Account Project
    put:
      summary: Update a project
      responses:
        '200':
          $ref: '#/components/responses/ProjectResponse'
      operationId: update-account-scoped-project
      description: Updates the information of the project with the matching project slug.
      security:
        - x-api-key: []
      requestBody:
        $ref: '#/components/requestBodies/UpdateProjectRequest'
      parameters:
        - $ref: '#/components/parameters/AccountQueryParam'
      tags:
        - Account Project
    delete:
      summary: Delete a project
      responses:
        '200':
          $ref: '#/components/responses/ProjectResponse'
      operationId: delete-account-scoped-project
      description: Deletes the information of the project with the matching project slug.
      security:
        - x-api-key: []
      parameters:
        - $ref: '#/components/parameters/AccountQueryParam'
      tags:
        - Account Project
    parameters:
      - schema:
          type: string
        name: project
        in: path
        required: true
        description: Project slug
  '/v1/orgs/{org}/projects/{project}':
    get:
      summary: Retrieve a project
      responses:
        '200':
          $ref: '#/components/responses/ProjectResponse'
      operationId: get-org-scoped-project
      description: Retrieves the information of the project with the matching project slug.
      security:
        - x-api-key: []
      parameters:
        - $ref: '#/components/parameters/AccountQueryParam'
      tags:
        - Org Project
    put:
      summary: Update a project
      responses:
        '200':
          $ref: '#/components/responses/ProjectResponse'
      operationId: update-org-scoped-project
      description: Updates the information of the project with the matching project slug.
      security:
        - x-api-key: []
      requestBody:
        $ref: '#/components/requestBodies/UpdateProjectRequest'
      parameters:
        - $ref: '#/components/parameters/AccountQueryParam'
      tags:
        - Org Project
    delete:
      summary: Delete a project
      responses:
        '200':
          $ref: '#/components/responses/ProjectResponse'
      operationId: delete-org-scoped-project
      description: Deletes the information of the project with the matching project slug.
      security:
        - x-api-key: []
      parameters:
        - $ref: '#/components/parameters/AccountQueryParam'
      tags:
        - Org Project
    parameters:
      - $ref: '#/components/parameters/OrgPathParam'
      - $ref: '#/components/parameters/ProjectPathParam'
  /v1/connectors:
    post:
      summary: Create a Connector
      operationId: create-account-scoped-connector
      responses:
        '201':
          $ref: '#/components/responses/ConnectorResponse'
      description: Creates a new connector
      parameters:
        - $ref: '#/components/parameters/AccountQueryParam'
      security:
        - x-api-key: []
      requestBody:
        $ref: '#/components/requestBodies/ConnectorRequest'
      tags:
        - Account Connector
    get:
      summary: List connectors
      operationId: get-account-scoped-connectors
      responses:
        '200':
          $ref: '#/components/responses/ConnectorListResponse'
      description: Retrieves the information of the connectors.
      tags:
        - Account Connector
      parameters:
        - $ref: '#/components/parameters/AccountQueryParam'
  '/v1/connectors/{connector}':
    get:
      summary: Retrieve a connector
      operationId: get-account-scoped-connector
      responses:
        '200':
          $ref: '#/components/responses/ConnectorResponse'
      description: |
        Retrieves the information of the connector with the matching connector slug.
      tags:
        - Account Connector
      parameters:
        - $ref: '#/components/parameters/AccountQueryParam'
    put:
      summary: Update a connector
      operationId: update-account-scoped-connector
      responses:
        '200':
          $ref: '#/components/responses/ConnectorResponse'
      description: Updates the information of the secret with the matching secret slug.
      parameters:
        - $ref: '#/components/parameters/AccountQueryParam'
      requestBody:
        $ref: '#/components/requestBodies/ConnectorRequest'
      tags:
        - Account Connector
    parameters:
      - schema:
          type: string
        name: connector
        in: path
        required: true
        description: Connector slug
    delete:
      summary: Delete a connector
      operationId: delete-account-scoped-connector
      responses:
        '200':
          description: OK
      description: Deletes the information of the connector with the matching connector slug.
      tags:
        - Account Connector
      parameters:
        - $ref: '#/components/parameters/AccountQueryParam'
  '/v1/orgs/{org}/connectors':
    post:
      summary: Create a Connector
      operationId: create-org-scoped-connector
      responses:
        '201':
          $ref: '#/components/responses/ConnectorResponse'
      description: Creates a new connector
      parameters:
        - $ref: '#/components/parameters/AccountQueryParam'
      security:
        - x-api-key: []
      requestBody:
        $ref: '#/components/requestBodies/ConnectorRequest'
      tags:
        - Org Connector
    parameters:
